function arrify(obj){
  if(!obj)return [];

  var answers = arrify(qval.answers).map(function(a){

  return Object.assign({id:qid},qval,{answers:answers});
}

/* ---- QR encoder (pure JS) ---- */
var QRGen = (function(){
  var EXP=new Uint8Array(512), LOG=new Uint8Array(256);
  (function(){
    var x=1;
    for(var i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x=x<128?x<<1:(x<<1)^285&0xff}
    for(var j=255;j<512;j++)EXP[j]=EXP[j-255];
  })();
  function mul(a,b){return a&&b?EXP[LOG[a]+LOG[b]]:0}
  function poly(ec){
    var p=[1];
    for(var i=0;i<ec;i++){
      var t=new Array(p.length+1).fill(0);
      for(var j=0;j<p.length;j++){t[j]^=mul(p[j],1);t[j+1]^=mul(p[j],EXP[i])}
      p=t;
    }
    return p;
  }
  function ecBytes(data,n){
    var g=poly(n);
    var r=data.concat(new Array(n).fill(0));
    for(var i=0;i<data.length;i++){
      var c=r.shift();r.push(0);
      if(c)for(var j=0;j<g.length;j++)r[j]^=mul(c,g[j]);
    }
    return r.slice(-n);
  }
  var CAP=[0,16,28,44,64,86,108,124,154,182,216];
  var EC_CW=[0,10,16,26,36,48,64,72,88,110,130];
  var EC_BL=[[],[1],[1],[1],[2],[2],[4],[4],[4],[5],[5]];
  var ALIGN=[[],[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,28,46],[6,32,50]];
  function encode(text){
    var bytes=new TextEncoder().encode(text), n=bytes.length;
    var ver=1; while(ver<=10 && CAP[ver]<n) ver++; if(ver>10) ver=10;
    var ecN=EC_CW[ver], bCount=EC_BL[ver][0]||1, totalData=CAP[ver];
    var dataBits=[];
    dataBits.push(0,1,0,0);
    for(var i=7;i>=0;i--)dataBits.push((n>>i)&1);
    for(var bi2=0;bi2<bytes.length;bi2++){var b=bytes[bi2];for(var k=7;k>=0;k--)dataBits.push((b>>k)&1)}
    for(var pi3=0;pi3<4 && dataBits.length<totalData*8;pi3++)dataBits.push(0);
    while(dataBits.length%8)dataBits.push(0);
    var pad=[0xEC,0x11],pi=0;
    while(dataBits.length<totalData*8){for(var k2=7;k2>=0;k2--)dataBits.push((pad[pi]>>k2)&1);pi^=1}
    var dataBytes=[];
    for(var di=0;di<dataBits.length;di+=8){var v=0;for(var dj=0;dj<8;dj++)v=(v<<1)|dataBits[di+dj];dataBytes.push(v)}
    var bLen=dataBytes.length, shortLen=Math.floor(bLen/bCount), longCount=bLen%bCount;
    var dBlocks=[], eBlocks=[], idx=0;
    for(var bc=0;bc<bCount;bc++){
      var len=bc<bCount-longCount?shortLen:shortLen+1;
      var blk=dataBytes.slice(idx,idx+len); idx+=len;
      dBlocks.push(blk); eBlocks.push(ecBytes(blk,ecN));
    }
    var interleaved=[];
    var maxD=0; for(var m=0;m<dBlocks.length;m++)maxD=Math.max(maxD,dBlocks[m].length);
    for(var ii=0;ii<maxD;ii++)for(var jj=0;jj<dBlocks.length;jj++)if(ii<dBlocks[jj].length)interleaved.push(dBlocks[jj][ii]);
    for(var ie=0;ie<ecN;ie++)for(var je=0;je<eBlocks.length;je++)interleaved.push(eBlocks[je][ie]);
    var size=ver*4+17;
    var M=[],R=[];
    for(var r0=0;r0<size;r0++){M.push(new Int8Array(size).fill(-1));R.push(new Uint8Array(size))}
    function set(r,c,val,res){if(r>=0&&r<size&&c>=0&&c<size){M[r][c]=val;if(res)R[r][c]=1}}
    function finder(tr,tc){
      for(var r=-1;r<=7;r++)for(var c=-1;c<=7;c++){
        var val=(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4))?1:0;
        set(tr+r,tc+c,val,true);
      }
    }
    finder(0,0);finder(0,size-7);finder(size-7,0);
    for(var t=8;t<size-8;t++){set(6,t,t%2?0:1,true);set(t,6,t%2?0:1,true)}
    set(size-8,8,1,true);
    var ap=ALIGN[ver];
    for(var a1=0;a1<ap.length;a1++)for(var a2=0;a2<ap.length;a2++){
      var ar=ap[a1],ac=ap[a2];
      if(R[ar][ac])continue;
      for(var r2=-2;r2<=2;r2++)for(var c2=-2;c2<=2;c2++){
        set(ar+r2,ac+c2,(Math.abs(r2)===2||Math.abs(c2)===2)?1:(r2===0&&c2===0?1:0),true);
      }
    }
    var fPos=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    var fPos2=[[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
    for(var f1=0;f1<fPos.length;f1++){R[fPos[f1][0]][fPos[f1][1]]=1}
    for(var f2=0;f2<fPos2.length;f2++){R[fPos2[f2][0]][fPos2[f2][1]]=1}
    var bits=[];
    for(var ib=0;ib<interleaved.length;ib++){var bb=interleaved[ib];for(var ik=7;ik>=0;ik--)bits.push((bb>>ik)&1)}
    var bi=0;
    var upward=true;
    for(var col=size-1;col>=0;col-=2){
      if(col===6)col--;
      for(var rstep=0;rstep<size;rstep++){
        var rr = upward ? (size-1-rstep) : rstep;
        for(var dc=0;dc<=1;dc++){
          var cc=col-dc;
          if(!R[rr][cc]){
            var maskOn=(rr+cc)%2===0;
            var bitv=bi<bits.length?bits[bi++]:0;
            M[rr][cc]=bitv^(maskOn?1:0);
          }
        }
      }
      upward = !upward;
    }
    var FMT=[1,0,1,1,0,1,1,1,1,0,0,0,1,0,0];
    for(var ff=0;ff<15;ff++){set(fPos[ff][0],fPos[ff][1],FMT[ff],false);set(fPos2[ff][0],fPos2[ff][1],FMT[ff],false)}
    return {matrix:M,size:size};
  }
  return {encode:encode};
})();

function QRCanvas(props){
  var url=props.url, size=props.size||160;
  var ref=useRef(null);
  useEffect(function(){
    if(!ref.current||!url)return;
    try{
      var res=QRGen.encode(url);
      var matrix=res.matrix, n=res.size;
      var cvs=ref.current; cvs.width=size; cvs.height=size;
      var ctx=cvs.getContext('2d'); var cell=size/n;
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,size,size);
      ctx.fillStyle='#000';
      for(var r=0;r<n;r++)for(var c=0;c<n;c++)if(matrix[r][c]===1)ctx.fillRect(c*cell,r*cell,cell,cell);
    }catch(e){console.warn('QR error',e)}
  },[url,size]);
  return <canvas ref={ref} style={{imageRendering:'pixelated',display:'block'}}/>;
}

function beep3(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(function(t){
      var o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function Timer(props){
  var expiresAt=props.expiresAt, onExpire=props.onExpire;
  var leftState=useState(null); var left=leftState[0], setLeft=leftState[1];
  var fired=useRef(false);
  useEffect(function(){
    if(!expiresAt)return;
    fired.current=false;
    function tick(){
      var s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));
      setLeft(s);
      if(s===0 && !fired.current){fired.current=true;beep3();if(onExpire)onExpire()}
    }
    tick();
    var iv=setInterval(tick,1000);
    return function(){clearInterval(iv)};
  },[expiresAt]);
  if(left===null)return null;
  var h=Math.floor(left/3600), m=Math.floor((left%3600)/60), s=left%60;
  function fmt(n){return String(n).padStart(2,'0')}
  return <span className={'tchip'+(left<60?' warn':'')}>
    <IconClock/>{h>0?(fmt(h)+':'):''}{fmt(m)}:{fmt(s)}{left===0?' Closed':''}
  </span>;
}

        });
      };
      ref.on('value',cb);
      return function(){ref.off('value',cb)};
    });
    return function(){unsubs.forEach(function(u){u()})};
  },[hosts,joined]);

  useEffect(function(){
    var p=new URLSearchParams(window.location.search).get('room');
    if(p) setActiveId(p);
  },[]);

  useEffect(function(){
    if(!activeId){ setActiveRoomData(null); return; }
    setLoading(true);
    var ref = db.ref('rooms/'+activeId);
    var cb = function(snap){
      var val = snap.val();
      setLoading(false);
      if(!val){ setActiveRoomData(undefined); return; }
      var meta = val.meta || {};
      var questions = Object.keys(val.questions||{}).map(function(qid){
        return normQ(qid, val.questions[qid]);
      });
      setActiveRoomData(Object.assign({id:activeId},meta,{questions:questions}));
    };
    ref.on('value',cb);
    return function(){ref.off('value',cb)};
  },[activeId]);

  var rm = activeRoomData || null;
  var isHost = !!(activeId && hosts[activeId]);
  var isClosed = !!(rm && rm.expiresAt && Date.now()>rm.expiresAt);
  var pageUrl = activeId ? (window.location.href.split('?')[0]+'?room='+activeId) : '';

  function createRoom(name,anon,expiresAt){
    var id=uid();
    var token=uid();
    var meta={name:name,anonymous:anon,expiresAt:expiresAt||null,createdAt:ts(),hostToken:token};
    fbSet('rooms/'+id+'/meta',meta);
    setHosts(function(h){var n=Object.assign({},h);n[id]=token;return n});
    setActiveId(id);
  }
  function joinRoom(code){
    code=code.trim();
    if(!code)return;
    db.ref('rooms/'+code+'/meta').once('value').then(function(snap){
      if(snap.exists()){
        setActiveId(code);
        setModal(null);
        setJoined(function(j){ if(j[code]) return j; var n=Object.assign({},j); n[code]=true; return n; });
      }
      else alert('Room not found / 找不到此 Room');
    });
  }
  function deleteRoom(id){
    fbRemove('rooms/'+id);
    setHosts(function(h){var n=Object.assign({},h);delete n[id];return n});
    setJoined(function(j){var n=Object.assign({},j);delete n[id];return n});
    setRoomList(function(r){var n=Object.assign({},r);delete n[id];return n});
    if(activeId===id)setActiveId(null);
  }
  function exportCSV(rmv){
    function pad(n){return String(n).padStart(2,'0')}
    var now=new Date();
    var dt=''+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'-'+pad(now.getHours())+pad(now.getMinutes());
    var fname=rmv.name+'-'+rmv.id+'-'+dt+'.csv';
    function esc(v){return '"'+String(v||'').replace(/"/g,'""')+'"'}
    var rows=[['Type','Author','Content','Likes','Time','Parent','ID']];
    (rmv.questions||[]).forEach(function(q){
      rows.push(['Question',esc(q.author),esc(q.text),q.likes||0,new Date(q.createdAt).toLocaleString(),'',q.id]);
      (q.answers||[]).forEach(function(a){
        rows.push(['Answer',esc(a.author),esc(a.text),a.likes||0,new Date(a.createdAt).toLocaleString(),q.id,a.id]);
        (a.replies||[]).forEach(function(r){
          rows.push(['Reply',esc(r.author),esc(r.text),r.likes||0,new Date(r.createdAt).toLocaleString(),a.id,r.id]);
        });
      });
    });
    var csv='\uFEFF'+rows.map(function(r){return r.join(',')}).join('\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=fname; a.click();
    setTimeout(function(){URL.revokeObjectURL(url)},1000);
  }
  function extendRoom(mins){
    if(!rm)return;
    var newExp=Math.max(Date.now(), rm.expiresAt||Date.now())+(mins*60*1000);
    fbUpdate('rooms/'+activeId+'/meta',{expiresAt:newExp});
  }
  function postQ(){
    if(!newQ.trim()||!rm||isClosed)return;
    if(!rm.anonymous && !qAuthor.trim()){alert('Name required / 請填寫名字');return}
    var q={text:newQ.trim(),author:rm.anonymous?'Anon 匿名':qAuthor.trim(),likes:0,createdAt:ts()};
    fbPush('rooms/'+activeId+'/questions',q);
    setNewQ(''); setQAuthor('');
  }
  function likeQuestion(q){ fbIncLike('rooms/'+activeId+'/questions/'+q.id) }
  function deleteQuestion(qid){ fbRemove('rooms/'+activeId+'/questions/'+qid) }
  function likeAnswer(qid,aid){ fbIncLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid) }
  function addAnswer(qid,text,author){ fbPush('rooms/'+activeId+'/questions/'+qid+'/answers',{text:text,author:author,likes:0,createdAt:ts()}) }
  function deleteAnswer(qid,aid){ fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid) }
  function likeReply(qid,aid,rid){ fbIncLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid) }
  function addReply(qid,aid,text,author){ fbPush('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies',{text:text,author:author,likes:0,createdAt:ts()}) }
  function deleteReply(qid,aid,rid){ fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid) }

  var sorted = rm ? (rm.questions||[]).slice().sort(function(a,b){return (b.likes||0)-(a.likes||0)}) : [];

  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {confRoom && <Confirm msg={'Delete room "'+(rm?rm.name:activeId)+'"?\n刪除問答室「'+(rm?rm.name:activeId)+'」？'} onOk={function(){deleteRoom(activeId);setConfRoom(false)}} onCancel={function(){setConfRoom(false)}}/>}

    {sideOpen && <div className="sidebar-scrim" onClick={function(){setSideOpen(false)}}/>}

    <div className={'sidebar'+(sideOpen?'':' closed')}>
      <div style={{padding:'14px 10px 10px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:800,color:'var(--green)',fontSize:16,letterSpacing:.5}}>ClassQ&A</div>
        <button onClick={function(){setSideOpen(false)}} style={{background:'none',border:'none',color:'#6b7280',fontSize:18,cursor:'pointer',lineHeight:1,padding:'2px 4px'}} title="Close menu">&#10005;</button>
      </div>
      <div style={{padding:'8px 6px',flex:1,overflowY:'auto'}}>
        <div style={{fontSize:10,color:'#9ca3af',marginBottom:5,paddingLeft:4,letterSpacing:1,fontWeight:600}}>ROOMS</div>
        {Object.keys(roomList).length===0 && <div style={{fontSize:13,color:'#9ca3af',padding:'6px 4px'}}>No rooms yet</div>}
        {Object.values(roomList).map(function(r){
          return <div key={r.id} className={'rtab'+(activeId===r.id?' act':'')} onClick={function(){setActiveId(r.id);setSideOpen(false)}}>
            <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,opacity:.72,marginTop:2,display:'flex',alignItems:'center',gap:4}}>
              {hosts[r.id] && <span>Host</span>}
              <span>{r.anonymous?'Anon':'Named'}</span>
              {r.expiresAt && <IconClock/>}
            </div>
          </div>;
        })}
      </div>
      <div className="sfooter">
        Architect: <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer">Prof. Shihmin Lo</a>
      </div>
    </div>

    <div className="main-col">
      <div className="topbar">
        <button onClick={function(){setSideOpen(!sideOpen)}} style={{background:'none',border:'none',color:'#fff',fontSize:19,cursor:'pointer',padding:'0 3px',flexShrink:0,lineHeight:1}} title="Menu 目錄">&#9776;</button>
        <span style={{fontWeight:700,fontSize:15,flexShrink:0,maxWidth:'28%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {rm ? rm.name : 'ClassQ&A'}
        </span>
        {rm && <div style={{display:'flex',alignItems:'center',gap:5,flex:1,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {rm.expiresAt && <Timer expiresAt={rm.expiresAt} onExpire={function(){setShowExtend(true)}}/>}
          <CodePill code={activeId} onZoom={function(){setModal('code')}}/>
          <button className="ic" onClick={function(){setModal('qr')}} title="QR Code"><IconQR/></button>
          {isHost && <ManageMenu onCSV={function(){exportCSV(rm)}} onDelete={function(){setConfRoom(true)}}/>}
        </div>}
      </div>

      <div className="actionsbar">
        <button className="btn btn-p" onClick={function(){setModal('create')}} style={{fontSize:12}}>+ Create 建立</button>
        <button className="btn btn-g" onClick={function(){setModal('join')}} style={{fontSize:12}}>Join/Switch 加入或切換</button>
        {rm && <span style={{fontSize:11,color:'#9ca3af',marginLeft:'auto'}}>Current 目前：{rm.name}</span>}
      </div>

      {rm && qrPinned && <div className="qrstrip">
        <QRCanvas url={pageUrl} size={88}/>
        <button onClick={function(){setQrPinned(false)}} style={{background:'none',border:'none',cursor:'pointer',fontSize:15,color:'#6b7280',padding:'0 2px',lineHeight:1}} title="Unpin">&#10005;</button>
      </div>}

      <div className="content-area">
        {!activeId ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:12,textAlign:'center',padding:20}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--green)',letterSpacing:.5}}>ClassQ&A</div>
          <div style={{fontSize:14,color:'#6b7280',maxWidth:300,lineHeight:1.6}}>
            Create or join a room to start.<br/>建立或加入問答室開始提問。
          </div>
        </div> : (loading || rm===null) ? <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#9ca3af',fontSize:14}}>
          Loading… 連線中…
        </div> : rm===undefined ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,textAlign:'center',padding:20}}>
          <div style={{fontSize:15,color:'#b91c1c',fontWeight:600}}>Room not found 找不到此問答室</div>
        </div> : <div className="content-inner">
          {isClosed ? <div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
            Session closed 問答已結束
            {isHost && <div style={{marginTop:10}}><button className="btn btn-p" onClick={function(){setShowExtend(true)}}>Extend 延長</button></div>}
          </div> : <div className="card" style={{borderLeft:'4px solid var(--green)'}}>
            <div style={{fontWeight:700,color:'var(--green)',marginBottom:9,fontSize:13,letterSpacing:.3}}>Ask a Question 提問</div>
            {!rm.anonymous && <div style={{marginBottom:8}}>
              <input type="text" value={qAuthor} onChange={function(e){setQAuthor(e.target.value)}}
                placeholder="Your name 你的名字 *" style={{borderColor:qAuthor.trim()?'#d1d5db':'#f87171'}}/>
              {!qAuthor.trim() && <div className="err">Required 必填</div>}
            </div>}
            <VoiceTxt value={newQ} onChange={setNewQ} placeholder="Type or speak your question… / 輸入或語音提問…" rows={3}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'#9ca3af'}}>{rm.anonymous?'Anon 匿名':'Named 具名'}</span>
              <button className="btn btn-p" onClick={postQ}>Submit 送出</button>
            </div>
          </div>}
          {sorted.length===0 ? <div style={{textAlign:'center',color:'#9ca3af',padding:'34px 0',fontSize:14,lineHeight:1.7}}>
            No questions yet. Be the first!<br/>尚無提問，歡迎第一個提問！
          </div> : <div>
            <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>
              {sorted.length} question{sorted.length>1?'s':''} · sorted by likes 依讚數排序
            </div>
            {sorted.map(function(q){return <QCard key={q.id} q={q} isHost={isHost} anon={rm.anonymous}
              onLikeQ={likeQuestion} onDeleteQ={deleteQuestion}
              onLikeAnswer={likeAnswer} onAddAnswer={addAnswer} onDeleteAnswer={deleteAnswer}
              onLikeReply={likeReply} onAddReply={addReply} onDeleteReply={deleteReply}/>})}
          </div>}
        </div>}
      </div>
    </div>

    {modal==='create' && <CreateModal onClose={function(){setModal(null)}} onCreate={createRoom}/>}
    {modal==='join' && <JoinModal onClose={function(){setModal(null)}} onJoin={joinRoom} joinedRooms={Object.values(roomList).filter(function(r){return joined[r.id] && r.id!==activeId})}/>}
    {modal==='qr' && <QRModal url={pageUrl} onPin={function(){setQrPinned(true)}} onClose={function(){setModal(null)}}/>}
    {modal==='code' && <CodeModal code={activeId||''} onClose={function(){setModal(null)}}/>}
    {showExtend && <ExtendModal onExtend={extendRoom} onClose={function(){setShowExtend(false)}}/>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
