<script type="text/babel" data-presets="react">
var useState=React.useState;var useEffect=React.useEffect;var useRef=React.useRef;
var HK='cqa7h'; /* 保持與舊版相同 key，避免 Host token 遺失 */
var JK='cqa7j';
var LK='cqa7lk';
var TK='cqa7theme';
var db=window.fbdb;
var uid=function(){return Math.random().toString(36).slice(2,10)};
var ts=function(){return Date.now()};
var load=function(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{}}};
var save=function(k,v){localStorage.setItem(k,JSON.stringify(v))};

/* merge hosts from all past versions to avoid losing host tokens on upgrade */
function loadHosts(){
  var merged={};
  ['cqa6h','cqa7h','cqa8h'].forEach(function(k){Object.assign(merged,load(k))});
  return merged;
}
function loadJoined(){
  var merged={};
  ['cqa7j','cqa8j','cqa6r','cqa7r','cqa8r'].forEach(function(k){Object.assign(merged,load(k))});
  return merged;
}

/* liked store: key -> 1 (liked) | -1 (unliked/removed) */
function getLiked(){try{return JSON.parse(localStorage.getItem(LK)||'{}')}catch(e){return{}}}
function toggleLiked(key){
  var m=getLiked();
  if(m[key]===1){m[key]=-1}else{m[key]=1}
  localStorage.setItem(LK,JSON.stringify(m));
  return m[key];
}
function likedState(key){var m=getLiked();return m[key]||0} /* 1=liked, -1=unliked, 0=never */

function fbSet(p,v){return db.ref(p).set(v)}
function fbUpdate(p,v){return db.ref(p).update(v)}
function fbPush(p,v){var r=db.ref(p).push();r.set(v);return r.key}
function fbRemove(p){return db.ref(p).remove()}
function fbLike(p,delta){db.ref(p+'/likes').transaction(function(cur){return Math.max(0,(cur||0)+delta)})}
function arrify(obj){if(!obj)return [];return Object.keys(obj).map(function(k){return Object.assign({id:k},obj[k])})}
function normQ(qid,qval){
  var answers=arrify(qval.answers).map(function(a){return Object.assign({},a,{replies:arrify(a.replies)})});
  return Object.assign({id:qid},qval,{answers:answers});
}

/* ---- Voice textarea ---- */
function VoiceTxt(props){
  var value=props.value,onChange=props.onChange,placeholder=props.placeholder,rows=props.rows||3;
  var ls=useState('zh-TW');var lang=ls[0],setLang=ls[1];
  var rs=useState(false);var rec=rs[0],setRec=rs[1];
  var rr=useRef(null);
  function mic(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech not supported / 不支援語音輸入');return}
    if(rec){if(rr.current)rr.current.stop();return}
    var r=new SR();r.lang=lang;r.interimResults=false;
    r.onresult=function(e){onChange(value+e.results[0][0].transcript)};
    r.onend=function(){setRec(false)};r.onerror=function(){setRec(false)};
    rr.current=r;r.start();setRec(true);
  }
  return <div>
    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
      <button onClick={mic} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,background:rec?'#b91c1c':'var(--green)',border:'none',borderRadius:8,padding:'5px 8px',cursor:'pointer',minWidth:40,animation:rec?'pulse 1s infinite':'none'}}>
        <MicIcon size={20}/><span style={{fontSize:10,color:'#fff',fontWeight:700,lineHeight:1}}>{lang==='zh-TW'?'中':'EN'}</span>
      </button>
      <select value={lang} onChange={function(e){setLang(e.target.value)}} style={{width:'auto',fontSize:12,padding:'3px 6px'}}>
        <option value="zh-TW">中文</option><option value="en-US">English</option>
      </select>
      {rec&&<span style={{fontSize:12,color:'#b91c1c'}}>Recording…</span>}
    </div>
    <textarea rows={rows} value={value} onChange={function(e){onChange(e.target.value)}} placeholder={placeholder} style={{width:'100%'}}/>
  </div>;
}

/* ---- beep ---- */
function beep3(){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.35,.7].forEach(function(t){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(.5,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.25);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3)})}catch(e){}}

/* ---- Timer ---- */
function Timer(props){
  var expiresAt=props.expiresAt,onExpire=props.onExpire;
  var ls=useState(null);var left=ls[0],setLeft=ls[1];
  var fired=useRef(false);
  useEffect(function(){
    if(!expiresAt)return;fired.current=false;
    function tick(){var s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));setLeft(s);if(s===0&&!fired.current){fired.current=true;beep3();if(onExpire)onExpire()}}
    tick();var iv=setInterval(tick,1000);return function(){clearInterval(iv)};
  },[expiresAt]);
  if(left===null)return null;
  var h=Math.floor(left/3600),m=Math.floor((left%3600)/60),s=left%60;
  function fmt(n){return String(n).padStart(2,'0')}
  return <span className={'tchip'+(left<60?' warn':'')}><IconClock/>{h>0?(fmt(h)+':'):''}{fmt(m)}:{fmt(s)}{left===0?' Closed':''}</span>;
}

/* ---- Confirm ---- */
function Confirm(props){
  return <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)props.onCancel()}}>
    <div className="cbox"><p>{props.msg}</p>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button className="btn btn-d" onClick={props.onOk}>Delete 確認刪除</button>
        <button className="btn btn-g" onClick={props.onCancel}>Cancel 取消</button>
      </div>
    </div>
  </div>;
}

/* ---- LikeBtn (toggleable) ---- */
function LikeBtn(props){
  var likeKey=props.likeKey,count=props.count,onLike=props.onLike,disabled=props.disabled;
  var initState=likedState(likeKey);
  var ls=useState(initState===1);var liked=ls[0],setLiked=ls[1];
  var cs=useState(count||0);var localCount=cs[0],setLocalCount=cs[1];
  useEffect(function(){setLocalCount(count||0)},[count]);
  function handle(){
    if(disabled)return;
    var cur=liked;
    var delta=cur?-1:1;
    toggleLiked(likeKey);
    setLiked(!cur);
    setLocalCount(function(c){return Math.max(0,c+delta)});
    onLike(delta);
  }
  return <button className={'like-btn'+(liked?' liked':'')} onClick={handle} disabled={disabled} title={disabled?'Session closed':'Toggle like 按讚/收回'}>
    <IconThumb/> {localCount}
  </button>;
}

/* ---- AnswerDelBtn ---- */
function AnswerDelBtn(props){
  var cs=useState(false);var conf=cs[0],setConf=cs[1];
  return <span>
    {conf&&<Confirm msg={"Delete this item?\n刪除此項目？"} onOk={function(){props.onDelete();setConf(false)}} onCancel={function(){setConf(false)}}/>}
    <button className="btn btn-d" style={{padding:'2px 7px',fontSize:11}} onClick={function(){setConf(true)}}>Del</button>
  </span>;
}

/* ---- AnswerReplyToggle ---- */
function AnswerReplyToggle(props){

function App(){
  var hs=useState(function(){return loadHosts()});var hosts=hs[0],setHosts=hs[1];
  var js=useState(function(){return loadJoined()});var joined=js[0],setJoined=js[1];
  var rls=useState({});var roomList=rls[0],setRoomList=rls[1];
  var ais=useState(null);var activeId=ais[0],setActiveId=ais[1];
  var ard=useState(null);var activeRoomData=ard[0],setActiveRoomData=ard[1];
  var ms=useState(null);var modal=ms[0],setModal=ms[1];
  var nqs=useState('');var newQ=nqs[0],setNewQ=nqs[1];
  var qas=useState('');var qAuthor=qas[0],setQAuthor=qas[1];
  var sos=useState(false);var sideOpen=sos[0],setSideOpen=sos[1];
  var ses=useState(false);var showExtend=ses[0],setShowExtend=ses[1];
  var crs=useState(false);var confRoom=crs[0],setConfRoom=crs[1];
  var lds=useState(false);var loading=lds[0],setLoading=lds[1];
  var themeInit=localStorage.getItem(TK)||'light';
  var tms=useState(themeInit);var theme=tms[0],setTheme=tms[1];
  var srtS=useState('likes');var sortBy=srtS[0],setSortBy=srtS[1];

  useEffect(function(){
    document.body.className=theme==='dark'?'dark':'';
    localStorage.setItem(TK,theme);
  },[theme]);
  useEffect(function(){save(HK,hosts)},[hosts]);
  useEffect(function(){save(JK,joined)},[joined]);

  useEffect(function(){
    var ids=Object.keys(hosts).concat(Object.keys(joined));
    var p=new URLSearchParams(window.location.search).get('room');
    if(p&&ids.indexOf(p)===-1)ids=ids.concat([p]);
    ids=ids.filter(function(v,i,a){return a.indexOf(v)===i});
    if(ids.length===0){setRoomList({});return}
    var unsubs=ids.map(function(id){
      var ref=db.ref('rooms/'+id+'/meta');
      var cb=function(snap){var val=snap.val();setRoomList(function(prev){var n=Object.assign({},prev);if(val)n[id]=Object.assign({id:id},val);else delete n[id];return n})};
      ref.on('value',cb);return function(){ref.off('value',cb)};
    });
    return function(){unsubs.forEach(function(u){u()})};
  },[hosts,joined]);

  useEffect(function(){
    var p=new URLSearchParams(window.location.search).get('room');
    if(p)setActiveId(p);
  },[]);

  useEffect(function(){
    if(!activeId){setActiveRoomData(null);return}
    setLoading(true);
    var ref=db.ref('rooms/'+activeId);
    var cb=function(snap){
      var val=snap.val();setLoading(false);
      if(!val){setActiveRoomData(undefined);return}
      var meta=val.meta||{};
      var questions=Object.keys(val.questions||{}).map(function(qid){return normQ(qid,val.questions[qid])});
      setActiveRoomData(Object.assign({id:activeId},meta,{questions:questions}));
    };
    ref.on('value',cb);return function(){ref.off('value',cb)};
  },[activeId]);

  var rm=activeRoomData||null;
  var isHost=!!(activeId&&hosts[activeId]);
  var isClosed=!!(rm&&rm.expiresAt&&Date.now()>rm.expiresAt);

  function createRoom(name,anon,expiresAt,allowExport){
    var id=uid(),token=uid();
    fbSet('rooms/'+id+'/meta',{name:name,anonymous:anon,expiresAt:expiresAt||null,createdAt:ts(),hostToken:token,allowExport:!!allowExport});
    setHosts(function(h){var n=Object.assign({},h);n[id]=token;return n});
    setActiveId(id);
  }
  function joinRoom(code){
    code=code.trim();if(!code)return;
    db.ref('rooms/'+code+'/meta').once('value').then(function(snap){
      if(snap.exists()){setActiveId(code);setModal(null);setJoined(function(j){if(j[code])return j;var n=Object.assign({},j);n[code]=true;return n})}
      else alert('Room not found / 找不到此 Room');
    });
  }
  function deleteRoom(id){
    fbRemove('rooms/'+id);
    setHosts(function(h){var n=Object.assign({},h);delete n[id];return n});
    setJoined(function(j){var n=Object.assign({},j);delete n[id];return n});
    setRoomList(function(r){var n=Object.assign({},r);delete n[id];return n});
    if(activeId===id)setActiveId(null);
  }
  function exportCSV(rmv){
    function pad(n){return String(n).padStart(2,'0')}
    var now=new Date();
    var dt=''+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'-'+pad(now.getHours())+pad(now.getMinutes());
    var fname=(rmv.name||'room')+'-'+rmv.id+'-'+dt+'.csv';
    function esc(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}
    function fmtTime(t){if(!t&&t!==0)return '';var d=new Date(t);if(isNaN(d.getTime()))return '';return d.toLocaleString()}
    var rows=[['Type','Author','Content','Likes','Time','Question #','Answer #']];
    var qSorted=(rmv.questions||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
    qSorted.forEach(function(q,qi){
      var qNum='Q'+(qi+1);
      rows.push(['Question',esc(q.author),esc(q.text),q.likes||0,esc(fmtTime(q.createdAt)),esc(qNum),'']);
      var aSorted=(q.answers||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
      aSorted.forEach(function(a,ai){
        var aNum='A'+(ai+1);
        rows.push(['Answer',esc(a.author),esc(a.text),a.likes||0,esc(fmtTime(a.createdAt)),esc(qNum),esc(aNum)]);
        var rSorted=(a.replies||[]).slice().sort(function(x,y){return (x.createdAt||0)-(y.createdAt||0)});
        rSorted.forEach(function(r,ri){
          rows.push(['Reply',esc(r.author),esc(r.text),r.likes||0,esc(fmtTime(r.createdAt)),esc(qNum),esc(aNum+'-R'+(ri+1))]);
        });
      });
    });
    var csv='\uFEFF'+rows.map(function(r){return r.join(',')}).join('\r\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=fname;a.click();
    setTimeout(function(){URL.revokeObjectURL(url)},1000);
  }
  function extendRoom(mins){
    if(!rm)return;
    var newExp=Math.max(Date.now(),rm.expiresAt||Date.now())+(mins*60*1000);
    fbUpdate('rooms/'+activeId+'/meta',{expiresAt:newExp});
  }
  function postQ(){
    if(!newQ.trim()||!rm)return;
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    if(!rm.anonymous&&!qAuthor.trim()){alert('Name required / 請填寫名字');return}
    fbPush('rooms/'+activeId+'/questions',{text:newQ.trim(),author:rm.anonymous?'Anon 匿名':qAuthor.trim(),likes:0,createdAt:ts()});
    setNewQ('');setQAuthor('');
  }
  function likeQuestion(qid,delta){fbLike('rooms/'+activeId+'/questions/'+qid,delta)}
  function deleteQuestion(qid){fbRemove('rooms/'+activeId+'/questions/'+qid)}
  function likeAnswer(qid,aid,delta){fbLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid,delta)}
  function addAnswer(qid,text,author){
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function deleteAnswer(qid,aid){fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid)}
  function likeReply(qid,aid,rid,delta){fbLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid,delta)}
  function addReply(qid,aid,text,author){
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function deleteReply(qid,aid,rid){fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid)}

  /* sort by likes, but carry original time-order index */
  var qByTime=rm?(rm.questions||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)}):[];
  var qIndexMap={};qByTime.forEach(function(q,i){qIndexMap[q.id]='Q'+(i+1)});
  var sorted=sortBy==='likes'
    ?qByTime.slice().sort(function(a,b){return (b.likes||0)-(a.likes||0)})
    :qByTime.slice();

  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {confRoom&&<Confirm msg={'Delete room "'+(rm?rm.name:activeId)+'"?\n刪除問答室「'+(rm?rm.name:activeId)+'」？'} onOk={function(){deleteRoom(activeId);setConfRoom(false)}} onCancel={function(){setConfRoom(false)}}/>}
    {sideOpen&&<div className="sidebar-scrim" onClick={function(){setSideOpen(false)}}/>}

    <div className={'sidebar'+(sideOpen?'':' closed')}>
      <div style={{padding:'14px 10px 10px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:800,color:'var(--green)',fontSize:16,letterSpacing:.5}}>ClassQ&A</div>
        <button onClick={function(){setSideOpen(false)}} style={{background:'none',border:'none',color:'var(--subtext)',fontSize:18,cursor:'pointer',lineHeight:1,padding:'2px 4px'}}>&#10005;</button>
      </div>
      <div style={{padding:'8px 6px',flex:1,overflowY:'auto'}}>
        <div style={{fontSize:10,color:'var(--subtext2)',marginBottom:5,paddingLeft:4,letterSpacing:1,fontWeight:600}}>ROOMS</div>
        {Object.keys(roomList).length===0&&<div style={{fontSize:13,color:'var(--subtext2)',padding:'6px 4px'}}>No rooms yet</div>}
        {Object.values(roomList).map(function(r){
          return <div key={r.id} className={'rtab'+(activeId===r.id?' act':'')} onClick={function(){setActiveId(r.id);setSideOpen(false)}}>
            <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,opacity:.72,marginTop:2,display:'flex',alignItems:'center',gap:4}}>
              {hosts[r.id]&&<span>Host</span>}
              <span>{r.anonymous?'Anon':'Named'}</span>
              {r.expiresAt&&<IconClock/>}
            </div>
          </div>;
        })}
      </div>
      <div className="sfooter">Architect: <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer">Prof. Shihmin Lo</a></div>
    </div>

    <div className="main-col">
      <div className="topbar">
        <button onClick={function(){setSideOpen(!sideOpen)}} style={{background:'none',border:'none',color:'#fff',fontSize:19,cursor:'pointer',padding:'0 3px',flexShrink:0,lineHeight:1}}>&#9776;</button>
        <span style={{fontWeight:700,fontSize:15,flexShrink:0,maxWidth:'28%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rm?rm.name:'ClassQ&A'}</span>
        <div style={{display:'flex',alignItems:'center',gap:5,flex:1,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {rm&&rm.expiresAt&&<Timer expiresAt={rm.expiresAt} onExpire={function(){if(isHost)setShowExtend(true)}}/>}
          {rm&&<CodePill code={activeId} onZoom={function(){setModal('code')}}/>}
          {rm&&isHost&&<ManageMenu onCSV={function(){exportCSV(rm)}} onDelete={function(){setConfRoom(true)}}/>}
          {rm&&!isHost&&rm.allowExport&&<button className="ic" onClick={function(){exportCSV(rm)}}>📥 CSV</button>}
          {rm&&!isHost&&<button className="ic" style={{fontSize:11,opacity:.7}} onClick={function(){
            var token=window.prompt('Enter host token to claim host access:\n輸入 Host Token 取得管理權限');
            if(token&&rm&&token.trim()===rm.hostToken){
              setHosts(function(h){var n=Object.assign({},h);n[activeId]=token.trim();return n});
              alert('Host access granted! 已取得管理權限');
            } else if(token){alert('Incorrect token / Token 不正確')}
          }} title="Claim host 取得管理權">🔑</button>}
          <button className="ic" onClick={function(){setTheme(theme==='dark'?'light':'dark')}} title="Toggle theme 切換主題">
            {theme==='dark'?<IconSun/>:<IconMoon/>}
          </button>
        </div>
      </div>

      <div className="actionsbar">
        <button className="btn btn-p" onClick={function(){setModal('create')}} style={{fontSize:12}}>+ Create 建立</button>
        <button className="btn btn-g" onClick={function(){setModal('join')}} style={{fontSize:12}}>Join/Switch 加入或切換</button>
        {rm&&<span style={{fontSize:11,color:'var(--subtext2)',marginLeft:'auto'}}>Current 目前：{rm.name}</span>}
      </div>

      <div className="content-area">
        {!activeId?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:12,textAlign:'center',padding:20}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--green)',letterSpacing:.5}}>ClassQ&A</div>
          <div style={{fontSize:14,color:'var(--subtext)',maxWidth:300,lineHeight:1.6}}>Create or join a room to start.<br/>建立或加入問答室開始提問。</div>
        </div>:loading||(rm===null)?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--subtext2)',fontSize:14}}>Loading… 連線中…</div>
        :rm===undefined?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#b91c1c',fontSize:15,fontWeight:600}}>Room not found 找不到此問答室</div>
        :<div className="content-inner">
          {isClosed?<div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
            Session closed 問答已結束
            {isHost&&<div style={{marginTop:10}}><button className="btn btn-p" onClick={function(){setShowExtend(true)}}>Extend 延長</button></div>}
          </div>:<div className="card" style={{borderLeft:'4px solid var(--green)'}}>
            <div style={{fontWeight:700,color:'var(--green)',marginBottom:9,fontSize:13}}>Ask a Question 提問</div>
            {!rm.anonymous&&<div style={{marginBottom:8}}>
              <input type="text" value={qAuthor} onChange={function(e){setQAuthor(e.target.value)}} placeholder="Your name 你的名字 *" style={{borderColor:qAuthor.trim()?undefined:'#f87171'}}/>
              {!qAuthor.trim()&&<div className="err">Required 必填</div>}
            </div>}
            <VoiceTxt value={newQ} onChange={setNewQ} placeholder="Type or speak your question… / 輸入或語音提問…" rows={3}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'var(--subtext2)'}}>{rm.anonymous?'Anon 匿名':'Named 具名'}</span>
              <button className="btn btn-p" onClick={postQ}>Submit 送出</button>
            </div>
          </div>}
          {sorted.length===0?<div style={{textAlign:'center',color:'var(--subtext2)',padding:'34px 0',fontSize:14,lineHeight:1.7}}>No questions yet. Be the first!<br/>尚無提問，歡迎第一個提問！</div>
          :<div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,flexWrap:'wrap',gap:6}}>
              <span style={{fontSize:12,color:'var(--subtext)'}}>
                {sorted.length} question{sorted.length>1?'s':''}
              </span>
              <div style={{display:'flex',gap:4}}>
                <button onClick={function(){setSortBy('likes')}}
                  style={{fontSize:11,padding:'3px 9px',borderRadius:999,border:'1px solid var(--border)',cursor:'pointer',fontFamily:'inherit',
                    background:sortBy==='likes'?'var(--green)':'var(--surface)',
                    color:sortBy==='likes'?'#fff':'var(--subtext)'}}>
                  👍 Likes 讚數
                </button>
                <button onClick={function(){setSortBy('time')}}
                  style={{fontSize:11,padding:'3px 9px',borderRadius:999,border:'1px solid var(--border)',cursor:'pointer',fontFamily:'inherit',
                    background:sortBy==='time'?'var(--green)':'var(--surface)',
                    color:sortBy==='time'?'#fff':'var(--subtext)'}}>
                  🕐 Time 時間
                </button>
              </div>
            </div>
            {sorted.map(function(q){return <QCard key={q.id} q={q} qNum={qIndexMap[q.id]} isHost={isHost} anon={rm.anonymous} closed={isClosed}
              onLikeQ={likeQuestion} onDeleteQ={deleteQuestion}
              onLikeAnswer={likeAnswer} onAddAnswer={addAnswer} onDeleteAnswer={deleteAnswer}
              onLikeReply={likeReply} onAddReply={addReply} onDeleteReply={deleteReply}/>})}
          </div>}
        </div>}
      </div>
    </div>

    {modal==='create'&&<CreateModal onClose={function(){setModal(null)}} onCreate={createRoom}/>}
    {modal==='join'&&<JoinModal onClose={function(){setModal(null)}} onJoin={joinRoom} joinedRooms={Object.values(roomList).filter(function(r){return joined[r.id]&&r.id!==activeId})}/>}
    {modal==='code'&&<CodeModal code={activeId||''} onClose={function(){setModal(null)}}/>}
    {showExtend&&<ExtendModal onExtend={extendRoom} onClose={function(){setShowExtend(false)}}/>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
