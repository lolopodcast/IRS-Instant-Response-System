<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>ClassQ&A 課堂問答</title>

<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none}
textarea,input{-webkit-user-select:text;user-select:text}
:root{--green:#004030;--gold:#D8C3A5;--lg:#e8f0ed;--fs:14px;--fss:13px;--fsxs:11px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f0;margin:0;font-size:var(--fs)}
/* buttons */
.btn{border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:var(--fss);font-family:inherit;transition:opacity .18s,background .15s;white-space:nowrap}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{opacity:.82}
.btn-g{background:transparent;border:1.5px solid var(--green);color:var(--green)}.btn-g:hover{background:var(--lg)}
.btn-d{background:#b91c1c;color:#fff}.btn-d:hover{opacity:.82}
/* topbar icon buttons */
.ic{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:var(--fss);font-family:inherit;line-height:1.4;display:inline-flex;align-items:center;gap:4px}
.ic:hover{background:rgba(255,255,255,.27)}
/* layout */
.sidebar{position:fixed;top:0;left:0;width:214px;background:#fff;border-right:1px solid #e5e7eb;height:100vh;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0;transition:transform .2s;z-index:150;transform:translateX(0)}
.sidebar.closed{transform:translateX(-100%)}
.sidebar-scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{background:var(--green);color:#fff;padding:9px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-height:50px}
.content-area{flex:1;overflow-y:auto;padding:16px}
.content-inner{max-width:700px;margin:0 auto}
/* cards */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;margin-bottom:12px}
/* like */
.like-btn{display:inline-flex;align-items:center;gap:5px;background:#f3f4f6;border:none;border-radius:999px;padding:4px 13px;cursor:pointer;font-size:var(--fss);font-family:inherit;transition:background .15s}
.like-btn:hover,.like-btn.liked{background:var(--gold)}
/* mic */
.mic-btn{background:var(--green);color:#fff;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
.mic-btn.rec{background:#b91c1c;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
/* inputs */
textarea,input[type=text],input[type=number],select{width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 11px;font-size:var(--fs);font-family:inherit}
textarea{resize:vertical}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--green)}
/* badges */
.badge{font-size:var(--fsxs);border-radius:999px;padding:1px 9px;color:#fff;font-weight:500}
.ba{background:#6b7280}.bn{background:var(--green)}
/* room tabs */
.rtab{cursor:pointer;padding:8px 10px;border-radius:8px;font-size:var(--fss);transition:background .13s;word-break:break-all}
.rtab.act{background:var(--green);color:#fff}
.rtab:not(.act):hover{background:var(--lg)}
/* reply thread */
.rthread{border-left:3px solid var(--gold);padding-left:10px;margin-top:9px}
/* overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.44);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h2{margin:0 0 14px;color:var(--green);font-size:16px;font-weight:700}
/* confirm */
.cbox{background:#fff;border-radius:10px;padding:22px;width:100%;max-width:310px;text-align:center}
.cbox p{margin:0 0 16px;font-size:var(--fs);color:#374151;line-height:1.5}
/* timer */
.tchip{background:rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tchip.warn{background:#b91c1c}
/* code pill */
.cpill{display:inline-flex;align-items:center;background:rgba(255,255,255,.17);border-radius:7px;overflow:hidden}
.cpill-side{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#fff;cursor:pointer;font-size:15px;flex-shrink:0}
.cpill-side:hover{background:rgba(255,255,255,.16)}
.cpill-mid{padding:0 9px;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;line-height:30px;white-space:nowrap;min-width:82px;text-align:center;color:#fff}
.cpill-mid:hover{background:rgba(255,255,255,.13)}
.cpill-mid.cp{background:rgba(255,255,255,.32)}
.cpill-div{width:1px;height:20px;background:rgba(255,255,255,.25);flex-shrink:0}
/* qr pin strip */
.qrstrip{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:flex-start;padding:8px;gap:5px}
/* form helpers */
label.row{display:flex;align-items:center;gap:8px;font-size:var(--fs);cursor:pointer;margin-bottom:11px}
.field{margin-bottom:12px}
.field label{display:block;font-size:var(--fss);color:#374151;margin-bottom:4px;font-weight:500}
.err{font-size:var(--fsxs);color:#b91c1c;margin-top:3px}
/* sidebar footer */
.sfooter{padding:10px 12px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;line-height:1.6}
.sfooter a{color:#9ca3af;text-decoration:none}
.sfooter a:hover{color:var(--green);text-decoration:underline}
/* room actions bar (always-visible create/join) */
.actionsbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:9px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* manage dropdown */
.mgwrap{position:relative}
.mgmenu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:150px;overflow:hidden;z-index:50}
.mgitem{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:#374151}
.mgitem:hover{background:#f3f4f6}
.mgitem.danger{color:#b91c1c}
/* svg icons inline */
.svg-ic{display:inline-block;vertical-align:middle}
@media(max-width:600px){
  .topbar{gap:5px}
  .cpill-mid{min-width:66px;font-size:12px}
}
</style>

/* ── QR encoder ── */
const QRGen=(()=>{
  const EXP=new Uint8Array(512),LOG=new Uint8Array(256);
  (()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x=x<128?x<<1:(x<<1)^285&0xff}for(let i=255;i<512;i++)EXP[i]=EXP[i-255]})();
  const mul=(a,b)=>a&&b?EXP[LOG[a]+LOG[b]]:0;
  const poly=ec=>{let p=[1];for(let i=0;i<ec;i++){const t=new Array(p.length+1).fill(0);for(let j=0;j<p.length;j++){t[j]^=mul(p[j],1);t[j+1]^=mul(p[j],EXP[i])}p=t}return p};
  const ecBytes=(data,n)=>{const g=poly(n);let r=[...data,...new Array(n).fill(0)];for(let i=0;i<data.length;i++){const c=r.shift();r.push(0);if(c)for(let j=0;j<g.length;j++)r[j]^=mul(c,g[j])}return r.slice(-n)};
  const CAP=[0,16,28,44,64,86,108,124,154,182,216];
  const EC_CW=[0,10,16,26,36,48,64,72,88,110,130];
  const EC_BL=[[],[1],[1],[1],[2],[2],[4],[4],[4],[5],[5]];
  const ALIGN=[[],[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,28,46],[6,32,50]];
  function encode(text){
    const bytes=new TextEncoder().encode(text),n=bytes.length;
    let ver=1;for(;ver<=10&&CAP[ver]<n;ver++);if(ver>10)ver=10;
    const ecN=EC_CW[ver],bCount=EC_BL[ver][0]||1,totalData=CAP[ver];
    const dataBits=[];
    dataBits.push(0,1,0,0);
    for(let i=7;i>=0;i--)dataBits.push((n>>i)&1);
    for(const b of bytes)for(let i=7;i>=0;i--)dataBits.push((b>>i)&1);
    for(let i=0;i<4&&dataBits.length<totalData*8;i++)dataBits.push(0);
    while(dataBits.length%8)dataBits.push(0);
    const pad=[0xEC,0x11];let pi=0;
    while(dataBits.length<totalData*8){for(let i=7;i>=0;i--)dataBits.push((pad[pi]>>i)&1);pi^=1}
    const dataBytes=[];
    for(let i=0;i<dataBits.length;i+=8){let v=0;for(let j=0;j<8;j++)v=(v<<1)|dataBits[i+j];dataBytes.push(v)}
    const bLen=dataBytes.length,shortLen=Math.floor(bLen/bCount),longCount=bLen%bCount;
    const dBlocks=[],eBlocks=[];let idx=0;
    for(let i=0;i<bCount;i++){const len=i<bCount-longCount?shortLen:shortLen+1;const blk=dataBytes.slice(idx,idx+len);idx+=len;dBlocks.push(blk);eBlocks.push(ecBytes(blk,ecN))}
    const interleaved=[];
    const maxD=Math.max(...dBlocks.map(b=>b.length));
    for(let i=0;i<maxD;i++)for(const b of dBlocks)if(i<b.length)interleaved.push(b[i]);
    for(let i=0;i<ecN;i++)for(const b of eBlocks)interleaved.push(b[i]);
    const size=ver*4+17;
    const M=Array.from({length:size},()=>new Int8Array(size).fill(-1));
    const R=Array.from({length:size},()=>new Uint8Array(size));
    const set=(r,c,v,res=false)=>{if(r>=0&&r<size&&c>=0&&c<size){M[r][c]=v;if(res)R[r][c]=1}};
    const finder=(tr,tc)=>{for(let r=-1;r<=7;r++)for(let c=-1;c<=7;c++){const v=r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4)?1:0;set(tr+r,tc+c,v,true)}};
    finder(0,0);finder(0,size-7);finder(size-7,0);
    for(let i=8;i<size-8;i++){set(6,i,i%2?0:1,true);set(i,6,i%2?0:1,true)}
    set(size-8,8,1,true);
    const ap=ALIGN[ver];
    for(const ar of ap)for(const ac of ap){if(R[ar][ac])continue;for(let r=-2;r<=2;r++)for(let c=-2;c<=2;c++){set(ar+r,ac+c,Math.abs(r)===2||Math.abs(c)===2?1:r===0&&c===0?1:0,true)}}
    const fPos=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    const fPos2=[[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
    for(const[r,c]of fPos)R[r][c]=1;for(const[r,c]of fPos2)R[r][c]=1;
    const bits=[];for(const b of interleaved)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
    let bi=0;
    for(let col=size-1;col>=0;col-=2){if(col===6)col--;
      for(let row=0;row<size;row++){const r=(col%4<2)?size-1-row:row;
        for(let dc=0;dc<=1;dc++){const c=col-dc;if(!R[r][c]){const mask=(r+c)%2===0;M[r][c]=(bi<bits.length?bits[bi++]:0)^(mask?1:0)}}}}
    const FMT=[1,0,1,1,0,1,1,1,1,0,0,0,1,0,0];
    for(let i=0;i<15;i++){set(...fPos[i],FMT[i]);set(...fPos2[i],FMT[i])}
    return{matrix:M,size};
  }
  return{encode};
})();

function QRCanvas({url,size=160}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!url)return;
    try{
      const{matrix,size:n}=QRGen.encode(url);
      const cvs=ref.current;cvs.width=size;cvs.height=size;
      const ctx=cvs.getContext('2d'),cell=size/n;
      ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
      ctx.fillStyle='#000';
      for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(matrix[r][c]===1)ctx.fillRect(c*cell,r*cell,cell,cell);
    }catch(e){console.warn('QR',e)}
  },[url,size]);
  return <canvas ref={ref} style={{imageRendering:'pixelated',display:'block'}}/>;
}

/* ── Confirm ── */
function Confirm({msg,onOk,onCancel}){

    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onCancel()}>

        <p>{msg}</p>

          <button className="btn btn-d" onClick={onOk}>Delete 確認刪除</button>
          <button className="btn btn-g" onClick={onCancel}>Cancel 取消</button>
        </div>
      </div>

}

/* ── Mic SVG icon ── */
function MicIcon({size=22,active=false}){
  const c=active?'#fff':'#fff';
  return(
    <svg width={size} height={size} viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* capsule body */}
      <rect x="7" y="1" width="8" height="14" rx="4" fill={c} fillOpacity={active?1:.9}/>
      {/* stand arc */}
      <path d="M4 13a7 7 0 0 0 14 0" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/>
      {/* stem */}
      <line x1="11" y1="20" x2="11" y2="24" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>

}

/* ── Voice textarea ── */
function VoiceTxt({value,onChange,placeholder,rows=3}){
  const [lang,setLang]=useState('zh-TW');
  const [rec,setRec]=useState(false);
  const rr=useRef(null);
  const mic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech not supported / 不支援語音輸入');return}
    if(rec){rr.current?.stop();return}
    const r=new SR();r.lang=lang;r.interimResults=false;
    r.onresult=e=>onChange(value+e.results[0][0].transcript);
    r.onend=()=>setRec(false);r.onerror=()=>setRec(false);
    rr.current=r;r.start();setRec(true);
  };
  const label=lang==='zh-TW'?'中':'EN';
  return(
    <div>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
        <button
          onClick={mic}
          title={rec?'Stop recording 停止':'Voice input 語音輸入'}
          style={{
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:1,background:rec?'#b91c1c':'var(--green)',
            border:'none',borderRadius:8,padding:'5px 8px',cursor:'pointer',
            animation:rec?'pulse 1s infinite':'none',minWidth:40,
          }}
        >
          <MicIcon size={20} active={rec}/>
          <span style={{fontSize:10,color:'#fff',fontWeight:700,lineHeight:1,fontFamily:'inherit',letterSpacing:.5}}>
            {label}
          </span>
        </button>
        <select value={lang} onChange={e=>setLang(e.target.value)} style={{width:'auto',fontSize:12,padding:'3px 6px'}}>
          <option value="zh-TW">中文</option><option value="en-US">English</option>
        </select>
        {rec&&<span style={{fontSize:12,color:'#b91c1c'}}>Recording…</span>}
      </div>
      <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:'100%'}}/>
    </div>
  );
}

/* ── helpers ── */
const likeIn=(arr,id)=>(arr||[]).map(a=>a.id===id?{...a,likes:(a.likes||0)+1,liked:true}:{...a,replies:likeIn(a.replies,id)});
const addReplyIn=(arr,pid,text,auth)=>(arr||[]).map(a=>a.id===pid?{...a,replies:[...(a.replies||[]),{id:uid(),text,author:auth,likes:0,liked:false,replies:[],createdAt:ts()}]}:{...a,replies:addReplyIn(a.replies,pid,text,auth)});
const delIn=(arr,id)=>(arr||[]).filter(a=>a.id!==id).map(a=>({...a,replies:delIn(a.replies,id)}));

/* ── beep ── */
function beep3(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.35,.7].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.25);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
    });
  }catch(e){}
}

/* ── Timer ── */
function Timer({expiresAt,onExpire}){
  const [left,setLeft]=useState(null);
  const fired=useRef(false);
  useEffect(()=>{
    if(!expiresAt)return;
    fired.current=false;
    const tick=()=>{
      const s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));
      setLeft(s);
      if(s===0&&!fired.current){fired.current=true;beep3();onExpire&&onExpire()}
    };
    tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);
  },[expiresAt]);
  if(left===null)return null;
  const h=Math.floor(left/3600),m=Math.floor((left%3600)/60),s=left%60;
  const fmt=n=>String(n).padStart(2,'0');
  return(
    <span className={`tchip${left<60?' warn':''}`}>
      <IconClock/>{h>0?`${fmt(h)}:`:''}{ fmt(m)}:{fmt(s)}{left===0?' Closed':''}
    </span>
  );
}

            <div style={{display:'flex',alignItems:'center',gap:5,flex:1,flexWrap:'wrap',justifyContent:'flex-end'}}>
              {rm.expiresAt&&<Timer expiresAt={rm.expiresAt} onExpire={()=>setShowExtend(true)}/>}
              <CodePill code={activeId} onZoom={()=>setModal('code')}/>
              <button className="ic" onClick={()=>setModal('qr')} title="QR Code">
                <IconQR/>
              </button>
              {isHost&&<ManageMenu onCSV={()=>exportCSV(rm)} onDelete={()=>setConfRoom(true)}/>}
            </div>
          )}
        </div>

        {/* Always-visible Create/Join bar */}
        <div className="actionsbar">
          <button className="btn btn-p" onClick={()=>setModal('create')} style={{fontSize:12}}>+ Create 建立</button>
          <button className="btn btn-g" onClick={()=>setModal('join')} style={{fontSize:12}}>Join 加入</button>
          {rm&&<span style={{fontSize:11,color:'#9ca3af',marginLeft:'auto'}}>Current 目前：{rm.name}</span>}
        </div>

        {rm&&qrPinned&&(
          <div className="qrstrip">
            <QRCanvas url={pageUrl} size={88}/>
            <button onClick={()=>setQrPinned(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:15,color:'#6b7280',padding:'0 2px',lineHeight:1}} title="Unpin">&#10005;</button>
          </div>
        )}

        <div className="content-area">
          {!rm?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:12,textAlign:'center',padding:20}}>
              <div style={{fontSize:28,fontWeight:800,color:'var(--green)',letterSpacing:.5}}>ClassQ&amp;A</div>
              <div style={{fontSize:14,color:'#6b7280',maxWidth:300,lineHeight:1.6}}>
                Create or join a room to start.<br/>建立或加入問答室開始提問。
              </div>
            </div>
          ):(
            <div className="content-inner">
              {isClosed?(
                <div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
                  Session closed 問答已結束
                  {isHost&&<div style={{marginTop:10}}><button className="btn btn-p" onClick={()=>setShowExtend(true)}>Extend 延長</button></div>}
                </div>
              ):(
                <div className="card" style={{borderLeft:'4px solid var(--green)'}}>
                  <div style={{fontWeight:700,color:'var(--green)',marginBottom:9,fontSize:13,letterSpacing:.3}}>Ask a Question 提問</div>
                  {!rm.anonymous&&(
                    <div style={{marginBottom:8}}>
                      <input type="text" value={qAuthor} onChange={e=>setQAuthor(e.target.value)}
                        placeholder="Your name 你的名字 *"
                        style={{borderColor:qAuthor.trim()?'#d1d5db':'#f87171'}}/>
                      {!qAuthor.trim()&&<div className="err">Required 必填</div>}
                    </div>
                  )}
                  <VoiceTxt value={newQ} onChange={setNewQ} placeholder="Type or speak your question… / 輸入或語音提問…" rows={3}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,flexWrap:'wrap',gap:8}}>
                    <span style={{fontSize:12,color:'#9ca3af'}}>{rm.anonymous?'Anon 匿名':'Named 具名'}</span>
                    <button className="btn btn-p" onClick={postQ}>Submit 送出</button>
                  </div>
                </div>
              )}
              {sorted.length===0?(
                <div style={{textAlign:'center',color:'#9ca3af',padding:'34px 0',fontSize:14,lineHeight:1.7}}>
                  No questions yet. Be the first!<br/>尚無提問，歡迎第一個提問！
                </div>
              ):(
                <>
                  <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>
                    {sorted.length} question{sorted.length>1?'s':''} · sorted by likes 依讚數排序
                  </div>
                  {sorted.map(q=><QCard key={q.id} q={q} isHost={isHost} anon={rm.anonymous} onUpdate={updQ} onDelete={delQ}/>)}
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {modal==='create'&&<CreateModal onClose={()=>setModal(null)} onCreate={createRoom}/>}
      {modal==='join'&&<JoinModal onClose={()=>setModal(null)} onJoin={joinRoom}/>}
      {modal==='qr'&&<QRModal url={pageUrl} onPin={()=>setQrPinned(true)} onClose={()=>setModal(null)}/>}
      {modal==='code'&&<CodeModal code={activeId||''} onClose={()=>setModal(null)}/>}
      {showExtend&&<ExtendModal onExtend={extendRoom} onClose={()=>setShowExtend(false)}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
