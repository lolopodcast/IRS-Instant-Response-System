.code-pill-hide:hover{background:rgba(255,255,255,.15)}

canvas{display:block}

  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:150;width:230px}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const SK='classqa_r3',HK='classqa_h3';
const uid=()=>Math.random().toString(36).slice(2,10);
const ts=()=>Date.now();
const load=k=>{try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return{}}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* ── pure-JS QR encoder (Reed-Solomon, no external lib) ── */
// Minimal QR Code generator — mode: byte, ECC: M, version auto
const QRGen=(()=>{
  // GF(256) arithmetic
  const EXP=new Uint8Array(512),LOG=new Uint8Array(256);
  (()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x=x<128?x<<1:(x<<1)^285&255}for(let i=255;i<512;i++)EXP[i]=EXP[i-255]})();
  const mul=(a,b)=>a&&b?EXP[LOG[a]+LOG[b]]:0;
  const poly=(ec)=>{let p=[1];for(let i=0;i<ec;i++){const t=[0,0];for(let j=0;j<p.length;j++){t[j]^=mul(p[j],1);t[j+1]^=mul(p[j],EXP[i])}p=t}return p};
  const ecBytes=(data,n)=>{const g=poly(n);let r=[...data];r.push(...new Array(n).fill(0));for(let i=0;i<data.length;i++){const c=r.shift();r.push(0);if(c)for(let j=0;j<g.length;j++)r[j]^=mul(c,g[j])}return r.slice(-n)};
  // Version/capacity tables (byte mode, ECC M) — versions 1-10
  const CAP=[0,16,28,44,64,86,108,124,154,182,216];
  const EC_CODEWORDS=[0,10,16,26,36,48,64,72,88,110,130];
  const EC_BLOCKS=[[],[1],[1],[1],[2],[2],[4],[4],[4],[5],[5]];
  // Alignment pattern positions
  const ALIGN=[[],[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,28,46],[6,32,50]];

  function encode(text){
    const bytes=new TextEncoder().encode(text);
    const n=bytes.length;
    let ver=1;for(;ver<=10&&CAP[ver]<n;ver++);
    if(ver>10)ver=10;
    const ecN=EC_CODEWORDS[ver],blocks=EC_BLOCKS[ver];
    const totalData=CAP[ver];
    // Data codewords
    const dataBits=[];
    // Mode indicator: byte = 0100
    dataBits.push(0,1,0,0);
    // Character count (8 bits for ver 1-9)
    for(let i=7;i>=0;i--)dataBits.push((n>>i)&1);
    for(const b of bytes)for(let i=7;i>=0;i--)dataBits.push((b>>i)&1);
    // Terminator
    for(let i=0;i<4&&dataBits.length<totalData*8;i++)dataBits.push(0);
    while(dataBits.length%8)dataBits.push(0);
    const pad=[0xEC,0x11];let pi=0;
    while(dataBits.length<totalData*8){for(let i=7;i>=0;i--)dataBits.push((pad[pi]>>i)&1);pi^=1}
    // To bytes
    const dataBytes=[];
    for(let i=0;i<dataBits.length;i+=8){let v=0;for(let j=0;j<8;j++)v=(v<<1)|dataBits[i+j];dataBytes.push(v)}
    // Split into blocks and compute EC
    const bLen=dataBytes.length,bCount=blocks[0]||1;
    const shortLen=Math.floor(bLen/bCount),longCount=bLen%bCount;
    const dBlocks=[],eBlocks=[];
    let idx=0;
    for(let i=0;i<bCount;i++){const len=i<bCount-longCount?shortLen:shortLen+1;const blk=dataBytes.slice(idx,idx+len);idx+=len;dBlocks.push(blk);eBlocks.push(ecBytes(blk,ecN))}
    // Interleave
    const interleaved=[];
    const maxD=Math.max(...dBlocks.map(b=>b.length));
    for(let i=0;i<maxD;i++)for(const b of dBlocks)if(i<b.length)interleaved.push(b[i]);
    for(let i=0;i<ecN;i++)for(const b of eBlocks)interleaved.push(b[i]);
    // Build matrix
    const size=ver*4+17;
    const M=Array.from({length:size},()=>new Int8Array(size).fill(-1));
    const R=Array.from({length:size},()=>new Uint8Array(size)); // reserved
    const set=(r,c,v,res=false)=>{if(r>=0&&r<size&&c>=0&&c<size){M[r][c]=v;if(res)R[r][c]=1}};
    // Finder patterns
    const finder=(tr,tc)=>{for(let r=-1;r<=7;r++)for(let c=-1;c<=7;c++){const v=r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4)?1:0;set(tr+r,tc+c,v,true)}};
    finder(0,0);finder(0,size-7);finder(size-7,0);
    // Timing
    for(let i=8;i<size-8;i++){set(6,i,i%2===0?1:0,true);set(i,6,i%2===0?1:0,true)}
    // Dark module
    set(size-8,8,1,true);
    // Alignment patterns
    const ap=ALIGN[ver];
    for(const ar of ap)for(const ac of ap){if(R[ar][ac])continue;for(let r=-2;r<=2;r++)for(let c=-2;c<=2;c++){const v=Math.abs(r)===2||Math.abs(c)===2?1:r===0&&c===0?1:0;set(ar+r,ac+c,v,true)}}
    // Format info placeholder
    const fmtPos=(v)=>{const p=[];for(let i=0;i<=5;i++)p.push([8,i]);p.push([8,7],[8,8],[7,8]);for(let i=5;i>=0;i--)p.push([i,8]);return p};
    for(const[r,c]of fmtPos())R[r][c]=1;
    for(let i=0;i<7;i++){R[size-1-i][8]=1;R[8][size-1-i]=1}
    // Place data bits with mask 0 (checkerboard)
    const bits=[];
    for(const b of interleaved)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
    let bi=0;let up=true;
    for(let col=size-1;col>=0;col-=2){if(col===6)col--;
      for(let row=0;row<size;row++){const r=up?size-1-row:row;
        for(let dc=0;dc<=1;dc++){const c=col-dc;if(!R[r][c]){const mask=(r+c)%2===0;const bit=bi<bits.length?bits[bi++]:0;M[r][c]=bit^(mask?1:0)}}}}
    // Format string (ECC M = 00, mask 0 = 000) → 101010000010010, XOR 101010000010010
    const FMT=[1,0,1,1,0,1,1,1,1,0,0,0,1,0,0];
    const fpos=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    const fpos2=[[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
    for(let i=0;i<15;i++){set(...fpos[i],FMT[i]);set(...fpos2[i],FMT[i])}
    return{matrix:M,size};
  }
  return{encode};
})();

function QRCanvas({url,size=160}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!url)return;
    try{
      const {matrix,size:n}=QRGen.encode(url);
      const cvs=ref.current;cvs.width=size;cvs.height=size;
      const ctx=cvs.getContext('2d');
      const cell=size/n;
      ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
      ctx.fillStyle='#000';
      for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(matrix[r][c]===1)ctx.fillRect(c*cell,r*cell,cell,cell);
    }catch(e){console.warn('QR error',e)}
  },[url,size]);
  return <canvas ref={ref} style={{imageRendering:'pixelated'}}/>;
}

/* ── Voice textarea ── */
function VoiceTxt({value,onChange,placeholder,rows=3}){
  const [lang,setLang]=useState('zh-TW');
  const [rec,setRec]=useState(false);
  const rr=useRef(null);
  const mic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('此瀏覽器不支援語音輸入');return}
    if(rec){rr.current?.stop();return}
    const r=new SR();r.lang=lang;r.interimResults=false;
    r.onresult=e=>onChange(value+e.results[0][0].transcript);
    r.onend=()=>setRec(false);r.onerror=()=>setRec(false);
    rr.current=r;r.start();setRec(true);
  };
  return(
    <div>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
        <select value={lang} onChange={e=>setLang(e.target.value)} style={{width:'auto',fontSize:12,padding:'3px 6px'}}>
          <option value="zh-TW">中文</option><option value="en-US">English</option>
        </select>
        <button className={`mic-btn${rec?' rec':''}`} onClick={mic}>{rec?'⏹':'🎤'}</button>
        {rec&&<span style={{fontSize:12,color:'#b91c1c'}}>錄音中…</span>}
      </div>
      <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:'100%'}}/>
    </div>
  );
}

/* ── helpers ── */
function likeIn(arr,id){return(arr||[]).map(a=>{if(a.id===id)return{...a,likes:(a.likes||0)+1,liked:true};return{...a,replies:likeIn(a.replies,id)}})}
function addReplyIn(arr,pid,text,anon){return(arr||[]).map(a=>{if(a.id===pid){const r={id:uid(),text,author:anon?'匿名':'使用者',likes:0,liked:false,replies:[],createdAt:ts()};return{...a,replies:[...(a.replies||[]),r]}}return{...a,replies:addReplyIn(a.replies,pid,text,anon)}})}
function delIn(arr,id){return(arr||[]).filter(a=>a.id!==id).map(a=>({...a,replies:delIn(a.replies,id)}))}

/* ── beep ── */
function beep3(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

/* ── Timer ── */
function Timer({expiresAt,onExpire}){
  const [left,setLeft]=useState(null);
  const fired=useRef(false);
  useEffect(()=>{
    if(!expiresAt)return;
    fired.current=false;
    const tick=()=>{const s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));setLeft(s);if(s===0&&!fired.current){fired.current=true;beep3();onExpire&&onExpire()}};
    tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);
  },[expiresAt]);
  if(left===null)return null;
  const h=Math.floor(left/3600),m=Math.floor((left%3600)/60),s=left%60;
  const fmt=n=>String(n).padStart(2,'0');
  return <span className={`timer-chip${left<60?' warn':''}`}>⏱ {h>0?`${fmt(h)}:`:''}{ fmt(m)}:{fmt(s)}{left===0?' 已結束':' left'}</span>;
}

/* ── Extend Modal ── */
function ExtendModal({onExtend,onClose}){
  const [mins,setMins]=useState(1);
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:320,textAlign:'center'}}>
        <h2>⏱ 時間到！Time's up!</h2>
        <p style={{color:'#374151',fontSize:14}}>要延長問答時間嗎？<br/>Extend the Q&amp;A session?</p>
        <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',marginBottom:18}}>
          <input type="number" value={mins} min={1} max={60} onChange={e=>setMins(+e.target.value)} style={{width:70,textAlign:'center',fontSize:18}}/>
          <span style={{fontSize:14}}>分鐘 min</span>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-p" onClick={()=>{onExtend(mins);onClose()}}>延長 Extend</button>
          <button className="btn btn-g" onClick={onClose}>關閉 Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── QR Modal (enlarged) ── */
function QRModal({url,onPin,onClose}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)})};
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{textAlign:'center',maxWidth:340}}>
        <h2>QR Code</h2>
        <div style={{display:'flex',justifyContent:'center',margin:'10px 0 16px'}}>
          <QRCanvas url={url} size={260}/>
        </div>
        <p style={{fontSize:11,color:'#6b7280',wordBreak:'break-all',margin:'0 0 14px'}}>{url}</p>
        <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-p" onClick={onPin}>📌 固定置頁首下 Pin</button>
          <button className="btn btn-g" onClick={copy}>{copied?'✅ 已複製':'📋 複製連結'}</button>
          <button className="btn btn-g" onClick={onClose}>✕ 關閉 Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Code Modal ── */
function CodeModal({code,onClose}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)})};
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{textAlign:'center',maxWidth:340}}>
        <h2>Room Code</h2>
        <div style={{fontSize:52,fontWeight:900,letterSpacing:8,color:'var(--green)',margin:'16px 0',fontVariantNumeric:'tabular-nums'}}>{code}</div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-p" onClick={copy}>{copied?'✅ 已複製':'📋 複製 Copy'}</button>
          <button className="btn btn-g" onClick={onClose}>關閉 Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Create Modal ── */
function CreateModal({onClose,onCreate}){
  const [name,setName]=useState('');
  const [anon,setAnon]=useState(false);
  const [timed,setTimed]=useState(false);
  const [hrs,setHrs]=useState(0);
  const [mins,setMins]=useState(30);
  const submit=()=>{
    if(!name.trim())return;
    const expiresAt=timed?Date.now()+(hrs*3600+mins*60)*1000:null;
    onCreate(name.trim(),anon,expiresAt);onClose();
  };
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>建立問答室 / Create Room</h2>
        <div className="field"><label>問答室名稱 Room Name</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例：Week 3 Q&A" onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
        </div>
        <label className="row"><input type="checkbox" checked={anon} onChange={e=>setAnon(e.target.checked)}/> 匿名模式 Anonymous mode</label>
        <label className="row"><input type="checkbox" checked={timed} onChange={e=>setTimed(e.target.checked)}/> 限時開放 Set timer</label>
        {timed&&(
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14,padding:'10px 12px',background:'#f9fafb',borderRadius:8}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
              <input type="number" value={hrs} min={0} max={23} onChange={e=>setHrs(+e.target.value)} style={{width:60}}/>
              <span style={{fontSize:13}}>時 hr</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
              <input type="number" value={mins} min={0} max={59} onChange={e=>setMins(+e.target.value)} style={{width:60}}/>
              <span style={{fontSize:13}}>分 min</span>
            </div>
          </div>
        )}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
          <button className="btn btn-g" onClick={onClose}>取消 Cancel</button>
          <button className="btn btn-p" onClick={submit}>建立 Create</button>
        </div>
      </div>
    </div>
  );
}

/* ── Join Modal ── */
function JoinModal({onClose,onJoin}){
  const [code,setCode]=useState('');
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>加入問答室 / Join Room</h2>
        <div className="field"><label>Room Code（8碼）</label>
          <input type="text" value={code} onChange={e=>setCode(e.target.value.trim())} placeholder="貼上代碼 Paste code" onKeyDown={e=>e.key==='Enter'&&onJoin(code)} autoFocus/>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-g" onClick={onClose}>取消</button>
          <button className="btn btn-p" onClick={()=>onJoin(code)}>加入 Join</button>
        </div>
      </div>
    </div>
  );
}

/* ── Reply item ── */
function ReplyItem({reply,onAct,isHost,depth=0}){
  const [show,setShow]=useState(false);
  const [txt,setTxt]=useState('');
  return(
    <div style={{marginTop:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
        <div style={{flex:1}}>
          <span style={{fontSize:12,color:'#6b7280',marginRight:6}}>{reply.author}</span>
          <span style={{fontSize:13}}>{reply.text}</span>
        </div>
        {isHost&&<button className="btn btn-d" style={{padding:'2px 7px',fontSize:11}} onClick={()=>onAct('del',reply.id)}>✕</button>}
      </div>
      <div style={{display:'flex',gap:7,marginTop:5,alignItems:'center',flexWrap:'wrap'}}>
        <button className={`like-btn${reply.liked?' liked':''}`} onClick={()=>onAct('like',reply.id)}>👍 {reply.likes||0}</button>
        {depth<1&&<button className="btn btn-g" style={{padding:'2px 8px',fontSize:12}} onClick={()=>setShow(v=>!v)}>回覆 Reply</button>}
      </div>
      {show&&(
        <div style={{marginTop:6}}>
          <VoiceTxt value={txt} onChange={setTxt} placeholder="輸入回覆…" rows={2}/>
          <div style={{display:'flex',gap:6,marginTop:5}}>
            <button className="btn btn-p" style={{fontSize:12,padding:'4px 12px'}} onClick={()=>{onAct('add_reply',reply.id,txt);setTxt('');setShow(false)}}>送出</button>
            <button className="btn btn-g" style={{fontSize:12}} onClick={()=>setShow(false)}>取消</button>
          </div>
        </div>
      )}
      {(reply.replies||[]).length>0&&(
        <div className="reply-thread">
          {[...(reply.replies||[])].sort((a,b)=>(b.likes||0)-(a.likes||0)).map(r2=>
            <ReplyItem key={r2.id} reply={r2} onAct={onAct} isHost={isHost} depth={depth+1}/>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Question card ── */
function QCard({q,isHost,anon,onUpdate,onDelete}){
  const [showA,setShowA]=useState(false);
  const [atxt,setAtxt]=useState('');
  const [aname,setAname]=useState('');
  const act=(type,id,txt)=>{
    if(type==='like')onUpdate({...q,answers:likeIn(q.answers,id)});
    else if(type==='add_reply')onUpdate({...q,answers:addReplyIn(q.answers,id,txt,anon)});
    else if(type==='del')onUpdate({...q,answers:delIn(q.answers,id)});
  };
  const submitA=()=>{
    if(!atxt.trim())return;
    const a={id:uid(),text:atxt,author:anon?'匿名':(aname||'使用者'),likes:0,liked:false,replies:[],createdAt:ts()};
    onUpdate({...q,answers:[...(q.answers||[]),a]});
    setAtxt('');setAname('');setShowA(false);
  };
  const sorted=[...(q.answers||[])].sort((a,b)=>(b.likes||0)-(a.likes||0));
  return(
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:5}}>
            <span className={`badge ${anon?'ba':'bn'}`}>{anon?'匿名 Anon':'具名 Named'}</span>
            {!anon&&<span style={{fontSize:12,color:'#6b7280'}}>{q.author}</span>}
            <span style={{fontSize:11,color:'#9ca3af'}}>{new Date(q.createdAt).toLocaleTimeString()}</span>
          </div>
          <p style={{margin:0,fontSize:15,fontWeight:500}}>{q.text}</p>
        </div>
        {isHost&&<button className="btn btn-d" style={{padding:'3px 8px',fontSize:12,flexShrink:0}} onClick={()=>onDelete(q.id)}>✕</button>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
        <button className={`like-btn${q.liked?' liked':''}`} onClick={()=>onUpdate({...q,likes:(q.likes||0)+1,liked:true})}>👍 {q.likes||0}</button>
        <button className="btn btn-g" style={{fontSize:12}} onClick={()=>setShowA(v=>!v)}>
          💬 回答 Answer ({(q.answers||[]).length})
        </button>
      </div>
      {sorted.length>0&&<div className="reply-thread" style={{marginTop:10}}>{sorted.map(a=><ReplyItem key={a.id} reply={a} onAct={act} isHost={isHost}/>)}</div>}
      {showA&&(
        <div style={{marginTop:10,padding:10,background:'#f9fafb',borderRadius:8}}>
          {!anon&&<input type="text" value={aname} onChange={e=>setAname(e.target.value)} placeholder="你的名字 Your name" style={{marginBottom:7}}/>}
          <VoiceTxt value={atxt} onChange={setAtxt} placeholder="輸入回答 / Type answer…" rows={2}/>
          <div style={{display:'flex',gap:6,marginTop:6}}>
            <button className="btn btn-p" style={{fontSize:12,padding:'4px 12px'}} onClick={submitA}>送出 Submit</button>
            <button className="btn btn-g" style={{fontSize:12}} onClick={()=>setShowA(false)}>取消</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Code Pill: [隱藏] [CODE — 長按複製] [放大] ── */
function CodePill({code,onZoom}){
  const [vis,setVis]=useState(true);
  const [copying,setCopying]=useState(false);
  const [copied,setCopied]=useState(false);
  const timerRef=useRef(null);

  const startPress=()=>{
    timerRef.current=setTimeout(()=>{
      navigator.clipboard?.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)});
    },1000);
    setCopying(true);
  };
  const endPress=()=>{clearTimeout(timerRef.current);setCopying(false)};

  return(
    <div className="code-pill">
      {/* 左：隱藏/顯示 — 位置固定 */}
      <button className="code-pill-hide" onClick={()=>setVis(v=>!v)} title={vis?'隱藏 Hide':'顯示 Show'}>
        {vis?'🙈':'👁️'}
      </button>
      {/* 中：Code + 複製（長按1秒） */}
      <div
        className={`code-pill-text${copying?' copying':''}`}
        onMouseDown={startPress} onMouseUp={endPress} onMouseLeave={endPress}
        onTouchStart={startPress} onTouchEnd={endPress}
        title="長按1秒複製 / Hold 1s to copy"
        style={{minWidth:vis?80:0,overflow:'hidden',transition:'min-width .2s'}}
      >
        {vis?(copied?'✅ 已複製':code):'──'}
      </div>
      {/* 右：放大 — 位置固定 */}
      <button className="code-pill-zoom" onClick={onZoom} title="放大 Zoom">🔍</button>
    </div>
  );
}

/* ── App ── */
function App(){
  const [rooms,setRooms]=useState(()=>load(SK));
  const [hosts,setHosts]=useState(()=>load(HK));
  const [activeId,setActiveId]=useState(null);
  const [modal,setModal]=useState(null);
  const [newQ,setNewQ]=useState('');
  const [author,setAuthor]=useState('');
  const [sideOpen,setSideOpen]=useState(true);
  const [qrPinned,setQrPinned]=useState(false);
  const [showExtend,setShowExtend]=useState(false);

  useEffect(()=>save(SK,rooms),[rooms]);
  useEffect(()=>save(HK,hosts),[hosts]);
  useEffect(()=>{const p=new URLSearchParams(window.location.search).get('room');if(p&&rooms[p])setActiveId(p)},[]);

  const rm=rooms[activeId]||null;
  const isHost=!!(activeId&&hosts[activeId]);
  const isClosed=rm?.expiresAt&&Date.now()>rm.expiresAt;
  const pageUrl=rm?`${window.location.href.split('?')[0]}?room=${activeId}`:'';

  const createRoom=(name,anon,expiresAt)=>{
    const id=uid();
    setRooms(r=>({...r,[id]:{id,name,anonymous:anon,expiresAt,questions:[],createdAt:ts()}}));
    setHosts(h=>({...h,[id]:uid()}));
    setActiveId(id);
  };
  const joinRoom=code=>{if(rooms[code]){setActiveId(code);setModal(null)}else alert('找不到此 Room / Room not found')};
  const leaveRoom=id=>{if(!confirm('確定要刪除此問答室？'))return;setRooms(r=>{const n={...r};delete n[id];return n});setHosts(h=>{const n={...h};delete n[id];return n});if(activeId===id)setActiveId(null)};

  const extendRoom=(mins)=>{
    if(!rm)return;
    const newExp=Math.max(Date.now(),rm.expiresAt||Date.now())+(mins*60*1000);
    setRooms(r=>({...r,[activeId]:{...rm,expiresAt:newExp}}));
  };

  const postQ=()=>{
    if(!newQ.trim()||!rm||isClosed)return;
    const q={id:uid(),text:newQ.trim(),author:rm.anonymous?'匿名':(author||'使用者'),likes:0,liked:false,answers:[],createdAt:ts()};
    setRooms(r=>({...r,[activeId]:{...rm,questions:[...(rm.questions||[]),q]}}));
    setNewQ('');setAuthor('');
  };
  const updQ=q=>setRooms(r=>({...r,[activeId]:{...rm,questions:(rm.questions||[]).map(x=>x.id===q.id?q:x)}}));
  const delQ=id=>setRooms(r=>({...r,[activeId]:{...rm,questions:(rm.questions||[]).filter(x=>x.id!==id)}}));
  const sorted=[...(rm?.questions||[])].sort((a,b)=>(b.likes||0)-(a.likes||0));

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <div className={`sidebar${sideOpen?'':' closed'}`}>
        <div style={{padding:'14px 10px 8px',borderBottom:'1px solid #e5e7eb'}}>
          <div style={{fontWeight:800,color:'var(--green)',fontSize:16,marginBottom:10}}>ClassQ&A</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <button className="btn btn-p" onClick={()=>setModal('create')} style={{width:'100%'}}>＋ 建立 Create</button>
            <button className="btn btn-g" onClick={()=>setModal('join')} style={{width:'100%'}}>🔗 加入 Join</button>
          </div>
        </div>
        <div style={{padding:'8px 6px',flex:1,overflowY:'auto'}}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:5,paddingLeft:4,letterSpacing:1}}>ROOMS</div>
          {Object.keys(rooms).length===0&&<div style={{fontSize:13,color:'#9ca3af',padding:'6px 4px'}}>尚無問答室</div>}
          {Object.values(rooms).map(r=>(
            <div key={r.id} className={`room-tab${activeId===r.id?' act':''}`} onClick={()=>setActiveId(r.id)}>
              <div style={{fontWeight:600}}>{r.name}</div>
              <div style={{fontSize:11,opacity:.75,marginTop:2}}>{hosts[r.id]?'👑 ':''}{r.anonymous?'🕵️ 匿名':'👤 具名'}{r.expiresAt?' ⏱':''}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Main */}
      <div className="main-col">
        {/* Topbar */}
        <div className="topbar">
          <button onClick={()=>setSideOpen(v=>!v)} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:'0 4px',flexShrink:0}}>☰</button>
          <span style={{fontWeight:700,fontSize:15,flexShrink:0}}>{rm?rm.name:'ClassQ&A'}</span>

          {rm&&(
            <div style={{display:'flex',alignItems:'center',gap:7,flex:1,flexWrap:'wrap'}}>
              {rm.expiresAt&&<Timer expiresAt={rm.expiresAt} onExpire={()=>setShowExtend(true)}/>}

              {/* Code Pill */}
              <CodePill code={activeId} onZoom={()=>setModal('code')}/>

              {/* QR button */}
              <button className="btn-ic" onClick={()=>setModal('qr')} title="QR Code">
                <span style={{fontSize:15}}>▦</span> QR
              </button>

              {isHost&&<button className="btn btn-d" style={{fontSize:12,marginLeft:'auto'}} onClick={()=>leaveRoom(activeId)}>🗑 刪除</button>}
            </div>
          )}
        </div>

        {/* Pinned QR strip */}
        {rm&&qrPinned&&(
          <div className="qr-strip">
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <QRCanvas url={pageUrl} size={100}/>
              <button className="btn btn-g" style={{fontSize:11,padding:'2px 10px'}} onClick={()=>setQrPinned(false)}>✕ 取消固定 Unpin</button>
            </div>
          </div>
        )}

        {/* Content */}
        <div className="content-area">
          {!rm?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,color:'#6b7280',textAlign:'center',padding:20}}>
              <div style={{fontSize:52}}>💬</div>
              <div style={{fontSize:20,fontWeight:700,color:'var(--green)'}}>ClassQ&A 課堂即時問答</div>
              <div style={{fontSize:14,maxWidth:300}}>建立或加入一個問答室開始提問<br/>Create or join a room to get started</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
                <button className="btn btn-p" onClick={()=>setModal('create')}>＋ 建立 Create Room</button>
                <button className="btn btn-g" onClick={()=>setModal('join')}>🔗 加入 Join Room</button>
              </div>
            </div>
          ):(
            <div className="content-inner">
              {isClosed?(
                <div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
                  ⏱ 此問答室已結束 / This room is closed
                  {isHost&&<div style={{marginTop:10}}><button className="btn btn-p" onClick={()=>setShowExtend(true)}>延長 Extend</button></div>}
                </div>
              ):(
                <div className="card" style={{borderLeft:'4px solid var(--green)'}}>
                  <div style={{fontWeight:600,color:'var(--green)',marginBottom:8,fontSize:14}}>✏️ 提問 Ask a Question</div>
                  {!rm.anonymous&&<input type="text" value={author} onChange={e=>setAuthor(e.target.value)} placeholder="你的名字 Your name（選填）" style={{marginBottom:8}}/>}
                  <VoiceTxt value={newQ} onChange={setNewQ} placeholder="輸入問題 / Speak or type your question…" rows={3}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,flexWrap:'wrap',gap:8}}>
                    <span style={{fontSize:12,color:'#9ca3af'}}>{rm.anonymous?'🕵️ 匿名模式':'👤 具名模式'}</span>
                    <button className="btn btn-p" onClick={postQ}>送出提問 Submit</button>
                  </div>
                </div>
              )}
              {sorted.length===0?(
                <div style={{textAlign:'center',color:'#9ca3af',padding:'40px 0',fontSize:15}}>尚無提問，快來第一個提問！<br/>No questions yet!</div>
              ):(
                <>
                  <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>{sorted.length} 則提問（依讚數排序）</div>
                  {sorted.map(q=><QCard key={q.id} q={q} isHost={isHost} anon={rm.anonymous} onUpdate={updQ} onDelete={delQ}/>)}
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Modals */}
      {modal==='create'&&<CreateModal onClose={()=>setModal(null)} onCreate={createRoom}/>}
      {modal==='join'&&<JoinModal onClose={()=>setModal(null)} onJoin={joinRoom}/>}
      {modal==='qr'&&<QRModal url={pageUrl} onPin={()=>{setQrPinned(true);setModal(null)}} onClose={()=>setModal(null)}/>}
      {modal==='code'&&<CodeModal code={activeId||''} onClose={()=>setModal(null)}/>}
      {showExtend&&<ExtendModal onExtend={extendRoom} onClose={()=>setShowExtend(false)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
