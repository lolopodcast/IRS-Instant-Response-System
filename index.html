<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none}
textarea,input,.card p,.card span,.content-area{-webkit-user-select:text;user-select:text}
:root{--green:#004030;--gold:#D8C3A5;--lg:#e8f0ed;--fs:14px;--fss:13px;--fsxs:11px;
  --bg:#f5f5f0;--surface:#fff;--border:#e5e7eb;--text:#111;--subtext:#6b7280;--subtext2:#9ca3af}
body.dark{--bg:#1a1a1a;--surface:#242424;--border:#333;--text:#f0f0f0;--subtext:#aaa;--subtext2:#666;--lg:#2a3a35}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);margin:0;font-size:var(--fs);color:var(--text);transition:background .2s,color .2s}
.btn{border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:var(--fss);font-family:inherit;transition:opacity .18s,background .15s;white-space:nowrap}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{opacity:.82}
.btn-g{background:transparent;border:1.5px solid var(--green);color:var(--green)}.btn-g:hover{background:var(--lg)}
.btn-d{background:#b91c1c;color:#fff}.btn-d:hover{opacity:.82}
.ic{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:var(--fss);font-family:inherit;line-height:1.4;display:inline-flex;align-items:center;gap:4px}
.ic:hover{background:rgba(255,255,255,.27)}
.sidebar{position:fixed;top:0;left:0;width:214px;background:var(--surface);border-right:1px solid var(--border);height:100vh;overflow-y:auto;display:flex;flex-direction:column;transition:transform .2s,background .2s;z-index:150;transform:translateX(0)}
.sidebar.closed{transform:translateX(-100%)}
.sidebar-scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{background:var(--green);color:#fff;padding:9px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-height:50px}
.content-area{flex:1;overflow-y:auto;padding:16px}
.content-inner{max-width:700px;margin:0 auto}
.card{background:var(--surface);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;margin-bottom:12px;transition:background .2s}
.like-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:4px 13px;cursor:pointer;font-size:var(--fss);font-family:inherit;transition:background .15s,opacity .15s;color:var(--text)}
.like-btn:hover{background:var(--gold);border-color:var(--gold)}
.like-btn.liked{background:var(--gold);border-color:var(--gold);color:#111}
.like-btn.liked:hover{opacity:.75}
.like-btn:disabled{cursor:not-allowed;opacity:.5}
textarea,input[type=text],input[type=number],input[type=date],input[type=time],select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:var(--fs);font-family:inherit;background:var(--surface);color:var(--text)}
textarea{resize:vertical}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--green)}
.badge{font-size:var(--fsxs);border-radius:999px;padding:1px 9px;color:#fff;font-weight:500}
.ba{background:#6b7280}.bn{background:var(--green)}
.rtab{cursor:pointer;padding:8px 10px;border-radius:8px;font-size:var(--fss);transition:background .13s;word-break:break-all;color:var(--text)}
.rtab.act{background:var(--green);color:#fff}
.rtab:not(.act):hover{background:var(--lg)}
.rthread{border-left:3px solid var(--gold);padding-left:10px;margin-top:9px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.44);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;color:var(--text)}
.modal h2{margin:0 0 14px;color:var(--green);font-size:16px;font-weight:700}
.cbox{background:var(--surface);border-radius:10px;padding:22px;width:100%;max-width:310px;text-align:center;color:var(--text)}
.cbox p{margin:0 0 16px;font-size:var(--fs);line-height:1.5;white-space:pre-line}
.tchip{background:rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tchip.warn{background:#b91c1c}
.cpill{display:inline-flex;align-items:center;background:rgba(255,255,255,.17);border-radius:7px;overflow:hidden}
.cpill-side{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#fff;cursor:pointer;flex-shrink:0}
.cpill-side:hover{background:rgba(255,255,255,.16)}
.cpill-mid{padding:0 9px;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;line-height:30px;white-space:nowrap;min-width:82px;text-align:center;color:#fff}
.cpill-mid:hover{background:rgba(255,255,255,.13)}
.cpill-mid.cp{background:rgba(255,255,255,.32)}
.cpill-div{width:1px;height:20px;background:rgba(255,255,255,.25);flex-shrink:0}
.actionsbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;transition:background .2s}
.mgwrap{position:relative}
.mgmenu{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:180px;overflow:hidden;z-index:50;border:1px solid var(--border)}
.mgitem{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text)}
.mgitem:hover{background:var(--bg)}
.mgitem.danger{color:#b91c1c}
label.row{display:flex;align-items:center;gap:8px;font-size:var(--fs);cursor:pointer;margin-bottom:11px;color:var(--text)}
.field{margin-bottom:12px}
.field label{display:block;font-size:var(--fss);color:var(--subtext);margin-bottom:4px;font-weight:500}
.err{font-size:var(--fsxs);color:#b91c1c;margin-top:3px}
.sfooter{padding:10px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--subtext2);line-height:1.6}
.sfooter a{color:var(--subtext2);text-decoration:none}
.sfooter a:hover{color:var(--green);text-decoration:underline}
.svg-ic{display:inline-block;vertical-align:middle}
.q-index{font-size:11px;font-weight:700;color:var(--green);background:var(--lg);border-radius:4px;padding:1px 6px;flex-shrink:0}
.role-tag{font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;background:var(--gold);color:#111}
.cpr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.cpr-box{background:#fff;border-radius:12px;padding:28px 28px 22px;max-width:360px;width:100%;font-family:'Segoe UI',system-ui,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.18)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@media(max-width:600px){.topbar{gap:5px}.cpill-mid{min-width:66px;font-size:12px}}
</style>

var code6=function(){var c='ABCDEFGHJKMNPQRSTUVWXYZ23456789',s='';for(var i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s};

function getLiked(){try{return JSON.parse(localStorage.getItem(LK)||'{}')}catch(e){return{}}}
function toggleLiked(key){var m=getLiked();m[key]=m[key]===1?-1:1;localStorage.setItem(LK,JSON.stringify(m));return m[key]}

function fbSet(p,v){return db.ref(p).set(v)}
function fbUpdate(p,v){return db.ref(p).update(v)}
function fbPush(p,v){var r=db.ref(p).push();r.set(v).catch(function(e){alert('Write failed / 寫入失敗: '+e.message)});return r.key}
function fbRemove(p){return db.ref(p).remove().catch(function(e){alert('Delete failed / 刪除失敗: '+e.message)})}
function fbLike(p,d){db.ref(p+'/likes').transaction(function(c){return Math.max(0,(c||0)+d)})}
function arrify(o){if(!o)return [];return Object.keys(o).map(function(k){return Object.assign({id:k},o[k])})}
function normQ(qid,qv){
  var answers=arrify(qv.answers).map(function(a){return Object.assign({},a,{replies:arrify(a.replies)})});
  return Object.assign({id:qid},qv,{answers:answers});
}

function InstallBtn(){
  var s=useState(!!window.__deferredPrompt);var can=s[0],setCan=s[1];
  useEffect(function(){
    function onCan(){setCan(true)}
    function onInst(){setCan(false);window.__deferredPrompt=null}
    window.addEventListener('pwa-installable',onCan);window.addEventListener('appinstalled',onInst);
    return function(){window.removeEventListener('pwa-installable',onCan);window.removeEventListener('appinstalled',onInst)};
  },[]);
  if(!can)return null;
  function install(){var p=window.__deferredPrompt;if(!p)return;p.prompt();p.userChoice.then(function(){window.__deferredPrompt=null;setCan(false)})}
  return <button className="ic" onClick={install} title="Install app 安裝"><IconDownload/> Install</button>;
}

function VoiceTxt(props){
  var value=props.value,onChange=props.onChange,placeholder=props.placeholder,rows=props.rows||3;
  var ls=useState('zh-TW');var lang=ls[0],setLang=ls[1];
  var rs=useState(false);var rec=rs[0],setRec=rs[1];
  var rr=useRef(null);
  function mic(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech not supported / 不支援語音輸入');return}
    if(rec){if(rr.current)rr.current.stop();return}
    var r=new SR();r.lang=lang;r.interimResults=false;
    r.onresult=function(e){onChange(value+e.results[0][0].transcript)};
    r.onend=function(){setRec(false)};r.onerror=function(){setRec(false)};
    rr.current=r;r.start();setRec(true);
  }
  return <div>
    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
      <button onClick={mic} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,background:rec?'#b91c1c':'var(--green)',border:'none',borderRadius:8,padding:'5px 8px',cursor:'pointer',minWidth:40,animation:rec?'pulse 1s infinite':'none'}}>
        <MicIcon size={20}/><span style={{fontSize:10,color:'#fff',fontWeight:700,lineHeight:1}}>{lang==='zh-TW'?'中':'EN'}</span>
      </button>
      <select value={lang} onChange={function(e){setLang(e.target.value)}} style={{width:'auto',fontSize:12,padding:'3px 6px'}}>
        <option value="zh-TW">中文</option><option value="en-US">English</option>
      </select>
      {rec&&<span style={{fontSize:12,color:'#b91c1c'}}>Recording…</span>}
    </div>
    <textarea rows={rows} value={value} onChange={function(e){onChange(e.target.value)}} placeholder={placeholder} style={{width:'100%'}}/>
  </div>;
}

function beep3(){try{var c=new(window.AudioContext||window.webkitAudioContext)();[0,.35,.7].forEach(function(t){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.5,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.25);o.start(c.currentTime+t);o.stop(c.currentTime+t+.3)})}catch(e){}}

function Timer(props){
  var expiresAt=props.expiresAt,onExpire=props.onExpire;
  var ls=useState(null);var left=ls[0],setLeft=ls[1];
  var fired=useRef(false);
  useEffect(function(){
    if(!expiresAt)return;fired.current=false;
    function tick(){var s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));setLeft(s);if(s===0&&!fired.current){fired.current=true;beep3();if(onExpire)onExpire()}}
    tick();var iv=setInterval(tick,1000);return function(){clearInterval(iv)};
  },[expiresAt]);
  if(left===null)return null;
  var h=Math.floor(left/3600),m=Math.floor((left%3600)/60),s=left%60;
  function f(n){return String(n).padStart(2,'0')}
  return <span className={'tchip'+(left<60?' warn':'')}><IconClock/>{h>0?(f(h)+':'):''}{f(m)}:{f(s)}{left===0?' Closed':''}</span>;
}

function Confirm(props){
  return <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)props.onCancel()}}>

function TAModal(props){
  var roomId=props.roomId;
  var is=useState(null);var invite=is[0],setInvite=is[1];
  var ms=useState({});var mods=ms[0],setMods=ms[1];

    r2.on('value',c2,function(){setMods({})});

  }
  function copy(){if(invite&&navigator.clipboard)navigator.clipboard.writeText(invite).then(function(){setCopied(true);setTimeout(function(){setCopied(false)},1400)})}
  var modList=Object.keys(mods);

        </div>
      </div>
      <div className="field">
        <label>Current TAs 目前助教（{modList.length}）</label>
        {modList.length===0
          ? <div style={{fontSize:13,color:'var(--subtext2)'}}>None yet 尚無助教</div>

              {modList.map(function(u){
                var m=mods[u]||{};
                return <div key={u} style={{display:'flex',alignItems:'center',gap:8,background:'var(--bg)',borderRadius:8,padding:'7px 10px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}}>{m.name||'TA'}</div>
                    <div style={{fontSize:10,color:'var(--subtext2)',overflow:'hidden',textOverflow:'ellipsis'}}>{u.slice(0,12)}…</div>
                  </div>

                </div>;
              })}
            </div>}
      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <button className="btn btn-g" onClick={props.onClose}>Close 關閉</button>
      </div>
    </div>

          </div>
          <div style={{flex:1,minWidth:100}}>
            <label style={{display:'block',fontSize:11,color:'var(--subtext)',marginBottom:3}}>Time 時間</label>
            <input type="time" value={timeVal} onChange={function(e){setTimeVal(e.target.value)}}/>
          </div>
        </div>}
      </div>}
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:6}}>
        <button className="btn btn-g" onClick={props.onClose}>Cancel 取消</button>
        <button className="btn btn-p" onClick={submit}>Create 建立</button>
      </div>
    </div>
  </div>;
}

function JoinModal(props){
  var cs=useState('');var code=cs[0],setCode=cs[1];
  var jr=props.joinedRooms||[];
  return <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)props.onClose()}}>
    <div className="modal">
      <h2>Join / Switch Room 加入或切換</h2>
      <div className="field"><label>Room Code</label>
        <input type="text" value={code} onChange={function(e){setCode(e.target.value.trim())}} placeholder="Paste 8-char code" onKeyDown={function(e){if(e.key==='Enter')props.onJoin(code)}} autoFocus/>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginBottom:jr.length?16:0}}>
        <button className="btn btn-g" onClick={props.onClose}>Cancel 取消</button>
        <button className="btn btn-p" onClick={function(){props.onJoin(code)}}>Join 加入</button>
      </div>
      {jr.length>0&&<div>
        <div style={{fontSize:11,color:'var(--subtext2)',marginBottom:6,letterSpacing:1,fontWeight:600}}>RECENTLY JOINED 最近加入過</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:200,overflowY:'auto'}}>
          {jr.map(function(r){return <div key={r.id} className="rtab" style={{border:'1px solid var(--border)'}} onClick={function(){props.onJoin(r.id)}}>
            <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,opacity:.65,marginTop:2}}>{r.anonymous?'Anon':'Named'}</div>
          </div>})}
        </div>
      </div>}
    </div>
  </div>;
}

/* ---- App ---- */
function App(){
  var us=useState(null);var myUid=us[0],setMyUid=us[1];
  var ars=useState(false);var authReady=ars[0],setAuthReady=ars[1];
  var js=useState(function(){return load(JK)});var joined=js[0],setJoined=js[1];
  var rls=useState({});var roomList=rls[0],setRoomList=rls[1];
  var ais=useState(null);var activeId=ais[0],setActiveId=ais[1];
  var mts=useState(null);var meta=mts[0],setMeta=mts[1];
  var qss=useState([]);var questions=qss[0],setQuestions=qss[1];
  var ims=useState(false);var isMod=ims[0],setIsMod=ims[1];
  var ms=useState(null);var modal=ms[0],setModal=ms[1];
  var nqs=useState('');var newQ=nqs[0],setNewQ=nqs[1];
  var qas=useState('');var qAuthor=qas[0],setQAuthor=qas[1];
  var sos=useState(false);var sideOpen=sos[0],setSideOpen=sos[1];
  var ses=useState(false);var showExtend=ses[0],setShowExtend=ses[1];
  var crs=useState(false);var confRoom=crs[0],setConfRoom=crs[1];
  var lds=useState(false);var loading=lds[0],setLoading=lds[1];
  var tms=useState(localStorage.getItem(TK)||'light');var theme=tms[0],setTheme=tms[1];
  var srs=useState('likes');var sortBy=srs[0],setSortBy=srs[1];

  useEffect(function(){document.body.className=theme==='dark'?'dark':'';localStorage.setItem(TK,theme)},[theme]);
  useEffect(function(){save(JK,joined)},[joined]);

  useEffect(function(){
    var un=auth.onAuthStateChanged(function(u){setMyUid(u?u.uid:null);setAuthReady(true)});
    return un;
  },[]);

  useEffect(function(){
    var ids=Object.keys(joined);
    var p=new URLSearchParams(window.location.search).get('room');
    if(p&&ids.indexOf(p)===-1)ids=ids.concat([p]);
    ids=ids.filter(function(v,i,a){return a.indexOf(v)===i});
    if(ids.length===0){setRoomList({});return}
    var unsubs=ids.map(function(id){
      var ref=db.ref('rooms/'+id+'/meta');
      var cb=function(s){var v=s.val();setRoomList(function(p2){var n=Object.assign({},p2);if(v)n[id]=Object.assign({id:id},v);else delete n[id];return n})};
      ref.on('value',cb,function(){});
      return function(){ref.off('value',cb)};
    });
    return function(){unsubs.forEach(function(u){u()})};
  },[joined]);

  useEffect(function(){
    var p=new URLSearchParams(window.location.search).get('room');
    if(p)setActiveId(p);
  },[]);

  /* meta listener */
  useEffect(function(){
    if(!activeId){setMeta(null);return}
    setLoading(true);
    var ref=db.ref('rooms/'+activeId+'/meta');
    var cb=function(s){setLoading(false);setMeta(s.exists()?s.val():undefined)};
    ref.on('value',cb,function(){setLoading(false);setMeta(undefined)});
    return function(){ref.off('value',cb)};
  },[activeId]);

  /* questions listener */
  useEffect(function(){
    if(!activeId){setQuestions([]);return}
    var ref=db.ref('rooms/'+activeId+'/questions');
    var cb=function(s){
      var v=s.val()||{};
      setQuestions(Object.keys(v).map(function(qid){return normQ(qid,v[qid])}));
    };
    ref.on('value',cb,function(){setQuestions([])});
    return function(){ref.off('value',cb)};
  },[activeId]);

  /* my moderator status */
  useEffect(function(){
    if(!activeId||!myUid){setIsMod(false);return}
    var ref=db.ref('rooms/'+activeId+'/moderators/'+myUid);
    var cb=function(s){setIsMod(s.exists())};
    ref.on('value',cb,function(){setIsMod(false)});
    return function(){ref.off('value',cb)};
  },[activeId,myUid]);

  var rm=meta?Object.assign({id:activeId},meta,{questions:questions}):meta;
  var isOwner=!!(rm&&myUid&&rm.ownerUid===myUid);
  var canMod=isOwner||isMod;
  var isClosed=!!(rm&&rm.expiresAt&&Date.now()>rm.expiresAt);

  function createRoom(name,anon,exp,allowExport,passcode){
    if(!myUid){alert('Not signed in yet, please retry / 尚未連線，請稍候再試');return}
    var id=uid();
    db.ref('rooms/'+id).set({
      meta:{name:name,anonymous:anon,expiresAt:exp||null,createdAt:ts(),ownerUid:myUid,allowExport:!!allowExport},
      secret:{createCode:passcode}
    })
      .then(function(){
        setJoined(function(j){var n=Object.assign({},j);n[id]=true;return n});
        setActiveId(id);
      })
      .catch(function(e){
        localStorage.removeItem(CK);
        alert('Create failed — check your passcode\n建立失敗，請確認通行碼是否正確');
      });
  }
  function joinRoom(c){
    c=c.trim();if(!c)return;
    db.ref('rooms/'+c+'/meta').once('value').then(function(s){
      if(s.exists()){setActiveId(c);setModal(null);setJoined(function(j){if(j[c])return j;var n=Object.assign({},j);n[c]=true;return n})}
      else alert('Room not found / 找不到此 Room');
    }).catch(function(e){alert('Error: '+e.message)});
  }
  function deleteRoom(id){
    db.ref('rooms/'+id).remove()
      .then(function(){
        setJoined(function(j){var n=Object.assign({},j);delete n[id];return n});
        setRoomList(function(r){var n=Object.assign({},r);delete n[id];return n});
        if(activeId===id)setActiveId(null);
      })
      .catch(function(e){alert('Delete failed / 刪除失敗: '+e.message)});
  }
  function exportCSV(rmv){
    function pad(n){return String(n).padStart(2,'0')}
    var now=new Date();
    var dt=''+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'-'+pad(now.getHours())+pad(now.getMinutes());
    var fname=(rmv.name||'room')+'-'+rmv.id+'-'+dt+'.csv';
    function esc(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}
    function ft(t){if(!t&&t!==0)return '';var d=new Date(t);if(isNaN(d.getTime()))return '';return d.toLocaleString()}
    var rows=[['Type','Author','Content','Likes','Time','Question #','Answer #']];
    var qs=(rmv.questions||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
    qs.forEach(function(q,qi){
      var qn='Q'+(qi+1);
      rows.push(['Question',esc(q.author),esc(q.text),q.likes||0,esc(ft(q.createdAt)),esc(qn),'']);
      var as=(q.answers||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
      as.forEach(function(a,ai){
        var an='A'+(ai+1);
        rows.push(['Answer',esc(a.author),esc(a.text),a.likes||0,esc(ft(a.createdAt)),esc(qn),esc(an)]);
        var rs2=(a.replies||[]).slice().sort(function(x,y){return (x.createdAt||0)-(y.createdAt||0)});
        rs2.forEach(function(r,ri){
          rows.push(['Reply',esc(r.author),esc(r.text),r.likes||0,esc(ft(r.createdAt)),esc(qn),esc(an+'-R'+(ri+1))]);
        });
      });
    });
    var csv='\uFEFF'+rows.map(function(r){return r.join(',')}).join('\r\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=fname;a.click();
    setTimeout(function(){URL.revokeObjectURL(url)},1000);
  }
  function extendRoom(mins){
    if(!rm)return;
    var ne=Math.max(Date.now(),rm.expiresAt||Date.now())+(mins*60*1000);
    db.ref('rooms/'+activeId+'/meta/expiresAt').set(ne).catch(function(e){alert('Extend failed / 延長失敗: '+e.message)});
  }
  function postQ(){
    if(!newQ.trim()||!rm)return;
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    if(!rm.anonymous&&!qAuthor.trim()){alert('Name required / 請填寫名字');return}
    fbPush('rooms/'+activeId+'/questions',{text:newQ.trim(),author:rm.anonymous?'Anon 匿名':qAuthor.trim(),likes:0,createdAt:ts()});
    setNewQ('');setQAuthor('');
  }
  function likeQ(qid,d){fbLike('rooms/'+activeId+'/questions/'+qid,d)}
  function delQ(qid){fbRemove('rooms/'+activeId+'/questions/'+qid)}
  function likeA(qid,aid,d){fbLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid,d)}
  function addA(qid,text,author){
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function delA(qid,aid){fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid)}
  function likeR(qid,aid,rid,d){fbLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid,d)}
  function addR(qid,aid,text,author){
    if(isClosed){alert('Session closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function delR(qid,aid,rid){fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid)}

  var qByTime=rm?(rm.questions||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)}):[];
  var qIdx={};qByTime.forEach(function(q,i){qIdx[q.id]='Q'+(i+1)});
  var sorted=sortBy==='likes'?qByTime.slice().sort(function(a,b){return (b.likes||0)-(a.likes||0)}):qByTime.slice();

  if(!authReady)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--subtext2)'}}>Connecting… 連線中…</div>;

  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {confRoom&&<Confirm msg={'Delete room "'+(rm?rm.name:activeId)+'"?\n刪除問答室「'+(rm?rm.name:activeId)+'」？'} onOk={function(){deleteRoom(activeId);setConfRoom(false)}} onCancel={function(){setConfRoom(false)}}/>}
    {sideOpen&&<div className="sidebar-scrim" onClick={function(){setSideOpen(false)}}/>}

    <div className={'sidebar'+(sideOpen?'':' closed')}>
      <div style={{padding:'14px 10px 10px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:800,color:'var(--green)',fontSize:16,letterSpacing:.5}}>ClassQ&A</div>
        <button onClick={function(){setSideOpen(false)}} style={{background:'none',border:'none',color:'var(--subtext)',fontSize:18,cursor:'pointer',lineHeight:1,padding:'2px 4px'}}>&#10005;</button>
      </div>
      <div style={{padding:'8px 6px',flex:1,overflowY:'auto'}}>
        <div style={{fontSize:10,color:'var(--subtext2)',marginBottom:5,paddingLeft:4,letterSpacing:1,fontWeight:600}}>ROOMS</div>
        {Object.keys(roomList).length===0&&<div style={{fontSize:13,color:'var(--subtext2)',padding:'6px 4px'}}>No rooms yet</div>}
        {Object.values(roomList).map(function(r){
          return <div key={r.id} className={'rtab'+(activeId===r.id?' act':'')} onClick={function(){setActiveId(r.id);setSideOpen(false)}}>
            <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,opacity:.72,marginTop:2,display:'flex',alignItems:'center',gap:4}}>
              {r.ownerUid===myUid&&<span>Host</span>}
              <span>{r.anonymous?'Anon':'Named'}</span>
              {r.expiresAt&&<IconClock/>}
            </div>
          </div>;
        })}
      </div>
      <div className="sfooter">Architect: <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer">Prof. Shihmin Lo</a></div>
    </div>

    <div className="main-col">
      <div className="topbar">
        <button onClick={function(){setSideOpen(!sideOpen)}} style={{background:'none',border:'none',color:'#fff',fontSize:19,cursor:'pointer',padding:'0 3px',flexShrink:0,lineHeight:1}}>&#9776;</button>
        <span style={{fontWeight:700,fontSize:15,flexShrink:0,maxWidth:'26%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rm?rm.name:'ClassQ&A'}</span>
        {rm&&isMod&&!isOwner&&<span className="role-tag">TA</span>}
        <div style={{display:'flex',alignItems:'center',gap:5,flex:1,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {rm&&rm.expiresAt&&<Timer expiresAt={rm.expiresAt} onExpire={function(){if(canMod)setShowExtend(true)}}/>}
          {rm&&<CodePill code={activeId} onZoom={function(){setModal('code')}}/>}
          {rm&&canMod&&<ManageMenu isOwner={isOwner} onCSV={function(){exportCSV(rm)}} onInvite={function(){setModal('ta')}} onDelete={function(){setConfRoom(true)}}/>}
          {rm&&!canMod&&rm.allowExport&&<button className="ic" onClick={function(){exportCSV(rm)}}><IconDownload/> CSV</button>}
          {rm&&!canMod&&<button className="ic" onClick={function(){setModal('claim')}} title="Become TA 成為助教"><IconKey/></button>}
          <InstallBtn/>
          <button className="ic" onClick={function(){setTheme(theme==='dark'?'light':'dark')}} title="Toggle theme 切換主題">{theme==='dark'?<IconSun/>:<IconMoon/>}</button>
        </div>
      </div>

      <div className="actionsbar">
        <button className="btn btn-p" onClick={function(){setModal('create')}} style={{fontSize:12}}>+ Create 建立</button>
        <button className="btn btn-g" onClick={function(){setModal('join')}} style={{fontSize:12}}>Join/Switch 加入或切換</button>
        {rm&&<span style={{fontSize:11,color:'var(--subtext2)',marginLeft:'auto'}}>Current 目前：{rm.name}</span>}
      </div>

      <div className="content-area">
        {!activeId?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:12,textAlign:'center',padding:20}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--green)',letterSpacing:.5}}>ClassQ&A</div>
          <div style={{fontSize:14,color:'var(--subtext)',maxWidth:300,lineHeight:1.6}}>Create or join a room to start.<br/>建立或加入問答室開始提問。</div>
        </div>:(loading||rm===null)?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--subtext2)',fontSize:14}}>Loading… 連線中…</div>
        :rm===undefined?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#b91c1c',fontSize:15,fontWeight:600}}>Room not found 找不到此問答室</div>
        :<div className="content-inner">
          {isClosed?<div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
            Session closed 問答已結束
            {canMod&&<div style={{marginTop:10}}><button className="btn btn-p" onClick={function(){setShowExtend(true)}}>Extend 延長</button></div>}
          </div>:<div className="card" style={{borderLeft:'4px solid var(--green)'}}>
            <div style={{fontWeight:700,color:'var(--green)',marginBottom:9,fontSize:13}}>Ask a Question 提問</div>
            {!rm.anonymous&&<div style={{marginBottom:8}}>
              <input type="text" value={qAuthor} onChange={function(e){setQAuthor(e.target.value)}} placeholder="Your name 你的名字 *" style={{borderColor:qAuthor.trim()?undefined:'#f87171'}}/>
              {!qAuthor.trim()&&<div className="err">Required 必填</div>}
            </div>}
            <VoiceTxt value={newQ} onChange={setNewQ} placeholder="Type or speak your question… / 輸入或語音提問…" rows={3}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'var(--subtext2)'}}>{rm.anonymous?'Anon 匿名':'Named 具名'}</span>
              <button className="btn btn-p" onClick={postQ}>Submit 送出</button>
            </div>
          </div>}
          {sorted.length===0?<div style={{textAlign:'center',color:'var(--subtext2)',padding:'34px 0',fontSize:14,lineHeight:1.7}}>No questions yet. Be the first!<br/>尚無提問，歡迎第一個提問！</div>
          :<div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,flexWrap:'wrap',gap:6}}>
              <span style={{fontSize:12,color:'var(--subtext)'}}>{sorted.length} question{sorted.length>1?'s':''}</span>
              <div style={{display:'flex',gap:4}}>
                <button onClick={function(){setSortBy('likes')}} style={{fontSize:11,padding:'3px 9px',borderRadius:999,border:'1px solid var(--border)',cursor:'pointer',fontFamily:'inherit',background:sortBy==='likes'?'var(--green)':'var(--surface)',color:sortBy==='likes'?'#fff':'var(--subtext)'}}>Likes 讚數</button>
                <button onClick={function(){setSortBy('time')}} style={{fontSize:11,padding:'3px 9px',borderRadius:999,border:'1px solid var(--border)',cursor:'pointer',fontFamily:'inherit',background:sortBy==='time'?'var(--green)':'var(--surface)',color:sortBy==='time'?'#fff':'var(--subtext)'}}>Time 時間</button>
              </div>
            </div>
            {sorted.map(function(q){return <QCard key={q.id} q={q} qNum={qIdx[q.id]} canMod={canMod} anon={rm.anonymous} closed={isClosed}
              onLikeQ={likeQ} onDeleteQ={delQ} onLikeAnswer={likeA} onAddAnswer={addA} onDeleteAnswer={delA}
              onLikeReply={likeR} onAddReply={addR} onDeleteReply={delR}/>})}
          </div>}
        </div>}
      </div>
    </div>

    {modal==='create'&&<CreateModal onClose={function(){setModal(null)}} onCreate={createRoom}/>}
    {modal==='join'&&<JoinModal onClose={function(){setModal(null)}} onJoin={joinRoom} joinedRooms={Object.values(roomList).filter(function(r){return joined[r.id]&&r.id!==activeId})}/>}
    {modal==='code'&&<CodeModal code={activeId||''} onClose={function(){setModal(null)}}/>}
    {modal==='ta'&&isOwner&&<TAModal roomId={activeId} onClose={function(){setModal(null)}}/>}
    {modal==='claim'&&<ClaimModal roomId={activeId} myUid={myUid} onClose={function(){setModal(null)}}/>}
    {showExtend&&<ExtendModal onExtend={extendRoom} onClose={function(){setShowExtend(false)}}/>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
