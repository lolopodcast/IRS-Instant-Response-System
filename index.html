<script type="text/babel" data-presets="react">
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var uid=function(){return Math.random().toString(36).slice(2,10)};
var ts=function(){return Date.now()};
var load=function(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{}}};
var save=function(k,v){localStorage.setItem(k,JSON.stringify(v))};
var HK='cqa7h';
var LK='cqa7liked';
var JK='cqa7joined';
var db=window.fbdb;

function getLiked(){try{return JSON.parse(localStorage.getItem(LK)||'{}')}catch(e){return{}}}
function setLiked(key){
  var m=getLiked(); m[key]=true;
  localStorage.setItem(LK,JSON.stringify(m));
}
function hasLiked(key){return !!getLiked()[key]}

function fbSet(path,val){return db.ref(path).set(val)}
function fbUpdate(path,val){return db.ref(path).update(val)}
function fbPush(path,val){var r=db.ref(path).push();r.set(val);return r.key}
function fbRemove(path){return db.ref(path).remove()}
function fbIncLike(path){db.ref(path+'/likes').transaction(function(cur){return (cur||0)+1})}
function arrify(obj){
  if(!obj)return [];
  return Object.keys(obj).map(function(k){return Object.assign({id:k},obj[k])});
}
function normQ(qid,qval){
  var answers = arrify(qval.answers).map(function(a){
    return Object.assign({},a,{replies:arrify(a.replies)});
  });
  return Object.assign({id:qid},qval,{answers:answers});
}

function MicIcon(props){

/* ---- QR Canvas (using qrcodejs library) ---- */
function QRCanvas(props){
  var url=props.url, size=props.size||160;
  var ref=useRef(null);
  useEffect(function(){
    if(!ref.current||!url)return;
    ref.current.innerHTML='';
    try{
      new QRCode(ref.current,{
        text:url,
        width:size,
        height:size,
        colorDark:'#000000',
        colorLight:'#ffffff',
        correctLevel:QRCode.CorrectLevel.M
      });
    }catch(e){console.warn('QR error',e)}
  },[url,size]);
  return <div ref={ref} style={{display:'inline-block',lineHeight:0}}/>;
}

function Confirm(props){
  return <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)props.onCancel()}}>
    <div className="cbox">
      <p>{props.msg}</p>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button className="btn btn-d" onClick={props.onOk}>Delete 確認刪除</button>
        <button className="btn btn-g" onClick={props.onCancel}>Cancel 取消</button>
      </div>
    </div>
  </div>;
}

function VoiceTxt(props){
  var value=props.value, onChange=props.onChange, placeholder=props.placeholder, rows=props.rows||3;
  var langState=useState('zh-TW'); var lang=langState[0], setLang=langState[1];
  var recState=useState(false); var rec=recState[0], setRec=recState[1];
  var rr=useRef(null);
  function mic(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech not supported / 不支援語音輸入');return}
    if(rec){if(rr.current)rr.current.stop();return}
    var r=new SR(); r.lang=lang; r.interimResults=false;
    r.onresult=function(e){onChange(value+e.results[0][0].transcript)};
    r.onend=function(){setRec(false)};
    r.onerror=function(){setRec(false)};
    rr.current=r; r.start(); setRec(true);
  }
  var label = lang==='zh-TW' ? '中' : 'EN';
  return <div>
    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
      <button onClick={mic} title={rec?'Stop 停止':'Voice input 語音輸入'}
        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,background:rec?'#b91c1c':'var(--green)',border:'none',borderRadius:8,padding:'5px 8px',cursor:'pointer',minWidth:40}}>
        <MicIcon size={20}/>
        <span style={{fontSize:10,color:'#fff',fontWeight:700,lineHeight:1,letterSpacing:.5}}>{label}</span>
      </button>
      <select value={lang} onChange={function(e){setLang(e.target.value)}} style={{width:'auto',fontSize:12,padding:'3px 6px'}}>
        <option value="zh-TW">中文</option>
        <option value="en-US">English</option>
      </select>
      {rec && <span style={{fontSize:12,color:'#b91c1c'}}>Recording…</span>}
    </div>
    <textarea rows={rows} value={value} onChange={function(e){onChange(e.target.value)}} placeholder={placeholder} style={{width:'100%'}}/>
  </div>;
}

function beep3(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(function(t){
      var o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function Timer(props){
  var expiresAt=props.expiresAt, onExpire=props.onExpire;
  var leftState=useState(null); var left=leftState[0], setLeft=leftState[1];
  var fired=useRef(false);
  useEffect(function(){
    if(!expiresAt)return;
    fired.current=false;
    function tick(){
      var s=Math.max(0,Math.floor((expiresAt-Date.now())/1000));
      setLeft(s);
      if(s===0 && !fired.current){fired.current=true;beep3();if(onExpire)onExpire()}
    }
    tick();
    var iv=setInterval(tick,1000);
    return function(){clearInterval(iv)};
  },[expiresAt]);
  if(left===null)return null;
  var h=Math.floor(left/3600), m=Math.floor((left%3600)/60), s=left%60;
  function fmt(n){return String(n).padStart(2,'0')}
  return <span className={'tchip'+(left<60?' warn':'')}>
    <IconClock/>{h>0?(fmt(h)+':'):''}{fmt(m)}:{fmt(s)}{left===0?' Closed':''}
  </span>;
}

  </span>;
}
function AnswerReplyToggle(props){

  var showState=useState(false); var show=showState[0], setShow=showState[1];
  var txtState=useState(''); var txt=txtState[0], setTxt=txtState[1];

        <button className="btn btn-g" style={{fontSize:12}} onClick={function(){setShow(false)}}>Cancel 取消</button>
      </div>
    </div>}
  </span>;
}

function QCard(props){
  var q=props.q, isHost=props.isHost, anon=props.anon;
  var onLikeQ=props.onLikeQ, onDeleteQ=props.onDeleteQ;
  var onLikeAnswer=props.onLikeAnswer, onAddAnswer=props.onAddAnswer, onDeleteAnswer=props.onDeleteAnswer;
  var onLikeReply=props.onLikeReply, onAddReply=props.onAddReply, onDeleteReply=props.onDeleteReply;
  var showAState=useState(false); var showA=showAState[0], setShowA=showAState[1];
  var atxtState=useState(''); var atxt=atxtState[0], setAtxt=atxtState[1];
  var anameState=useState(''); var aname=anameState[0], setAname=anameState[1];
  var confQState=useState(false); var confQ=confQState[0], setConfQ=confQState[1];
  function submitA(){
    if(!atxt.trim())return;
    if(!anon && !aname.trim()){alert('Name required / 請填寫名字');return}
    onAddAnswer(q.id, atxt, anon?'Anon 匿名':aname.trim());
    setAtxt(''); setAname(''); setShowA(false);
  }
  var sorted=(q.answers||[]).slice().sort(function(a,b){return (b.likes||0)-(a.likes||0)});
  return <div className="card">
    {confQ && <Confirm msg={"Delete this question?\n刪除此問題？"} onOk={function(){onDeleteQ(q.id);setConfQ(false)}} onCancel={function(){setConfQ(false)}}/>}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
      <div style={{flex:1}}>

  var hrsState=useState(0); var hrs=hrsState[0], setHrs=hrsState[1];

function App(){
  var hostsState=useState(function(){return load(HK)}); var hosts=hostsState[0], setHosts=hostsState[1];
  var joinedState=useState(function(){return load(JK)}); var joined=joinedState[0], setJoined=joinedState[1];
  var roomListState=useState({}); var roomList=roomListState[0], setRoomList=roomListState[1];
  var activeIdState=useState(null); var activeId=activeIdState[0], setActiveId=activeIdState[1];
  var activeRoomState=useState(null); var activeRoomData=activeRoomState[0], setActiveRoomData=activeRoomState[1];
  var modalState=useState(null); var modal=modalState[0], setModal=modalState[1];
  var newQState=useState(''); var newQ=newQState[0], setNewQ=newQState[1];
  var qAuthorState=useState(''); var qAuthor=qAuthorState[0], setQAuthor=qAuthorState[1];
  var sideOpenState=useState(false); var sideOpen=sideOpenState[0], setSideOpen=sideOpenState[1];
  var showExtendState=useState(false); var showExtend=showExtendState[0], setShowExtend=showExtendState[1];
  var confRoomState=useState(false); var confRoom=confRoomState[0], setConfRoom=confRoomState[1];
  var loadingState=useState(false); var loading=loadingState[0], setLoading=loadingState[1];

  useEffect(function(){save(HK,hosts)},[hosts]);
  useEffect(function(){save(JK,joined)},[joined]);

  useEffect(function(){
    var knownIds = Object.keys(hosts).concat(Object.keys(joined));
    var p = new URLSearchParams(window.location.search).get('room');
    if(p && knownIds.indexOf(p)===-1) knownIds = knownIds.concat([p]);
    knownIds = knownIds.filter(function(v,i,a){return a.indexOf(v)===i});
    if(knownIds.length===0){ setRoomList({}); return; }
    var unsubs = knownIds.map(function(id){
      var ref = db.ref('rooms/'+id+'/meta');
      var cb = function(snap){
        var val = snap.val();
        setRoomList(function(prev){
          var n=Object.assign({},prev);
          if(val) n[id]=Object.assign({id:id},val);
          else delete n[id];
          return n;
        });
      };
      ref.on('value',cb);
      return function(){ref.off('value',cb)};
    });
    return function(){unsubs.forEach(function(u){u()})};
  },[hosts,joined]);

  useEffect(function(){
    var p=new URLSearchParams(window.location.search).get('room');
    if(p) setActiveId(p);
  },[]);

  useEffect(function(){
    if(!activeId){ setActiveRoomData(null); return; }
    setLoading(true);
    var ref = db.ref('rooms/'+activeId);
    var cb = function(snap){
      var val = snap.val();
      setLoading(false);
      if(!val){ setActiveRoomData(undefined); return; }
      var meta = val.meta || {};
      var questions = Object.keys(val.questions||{}).map(function(qid){
        return normQ(qid, val.questions[qid]);
      });
      setActiveRoomData(Object.assign({id:activeId},meta,{questions:questions}));
    };
    ref.on('value',cb);
    return function(){ref.off('value',cb)};
  },[activeId]);

  var rm = activeRoomData || null;
  var isHost = !!(activeId && hosts[activeId]);
  var isClosed = !!(rm && rm.expiresAt && Date.now()>rm.expiresAt);
  var pageUrl = activeId ? (window.location.href.split('?')[0]+'?room='+activeId) : '';

  function createRoom(name,anon,expiresAt,allowExport){
    var id=uid();
    var token=uid();
    var meta={name:name,anonymous:anon,expiresAt:expiresAt||null,createdAt:ts(),hostToken:token,allowExport:!!allowExport};
    fbSet('rooms/'+id+'/meta',meta);
    setHosts(function(h){var n=Object.assign({},h);n[id]=token;return n});
    setActiveId(id);
  }
  function joinRoom(code){
    code=code.trim();
    if(!code)return;
    db.ref('rooms/'+code+'/meta').once('value').then(function(snap){
      if(snap.exists()){
        setActiveId(code);
        setModal(null);
        setJoined(function(j){ if(j[code]) return j; var n=Object.assign({},j); n[code]=true; return n; });
      }
      else alert('Room not found / 找不到此 Room');
    });
  }
  function deleteRoom(id){
    fbRemove('rooms/'+id);
    setHosts(function(h){var n=Object.assign({},h);delete n[id];return n});
    setJoined(function(j){var n=Object.assign({},j);delete n[id];return n});
    setRoomList(function(r){var n=Object.assign({},r);delete n[id];return n});
    if(activeId===id)setActiveId(null);
  }
  function exportCSV(rmv){
    function pad(n){return String(n).padStart(2,'0')}
    var now=new Date();
    var dt=''+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'-'+pad(now.getHours())+pad(now.getMinutes());
    var fname=(rmv.name||'room')+'-'+rmv.id+'-'+dt+'.csv';
    function esc(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}
    function fmtTime(t){
      if(!t && t!==0) return '';
      var d=new Date(t);
      if(isNaN(d.getTime())) return '';
      return d.toLocaleString();
    }
    var rows=[['Type','Author','Content','Likes','Time','Question #','Answer #']];
    var qSorted=(rmv.questions||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
    qSorted.forEach(function(q,qi){
      var qNum='Q'+(qi+1);
      rows.push(['Question',esc(q.author),esc(q.text),q.likes||0,esc(fmtTime(q.createdAt)),esc(qNum),'']);
      var aSorted=(q.answers||[]).slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)});
      aSorted.forEach(function(a,ai){
        var aNum='A'+(ai+1);
        rows.push(['Answer',esc(a.author),esc(a.text),a.likes||0,esc(fmtTime(a.createdAt)),esc(qNum),esc(aNum)]);
        var rSorted=(a.replies||[]).slice().sort(function(x,y){return (x.createdAt||0)-(y.createdAt||0)});
        rSorted.forEach(function(r,ri){
          rows.push(['Reply',esc(r.author),esc(r.text),r.likes||0,esc(fmtTime(r.createdAt)),esc(qNum),esc(aNum+'-R'+(ri+1))]);
        });
      });
    });
    var csv='\uFEFF'+rows.map(function(r){return r.join(',')}).join('\r\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=fname; a.click();
    setTimeout(function(){URL.revokeObjectURL(url)},1000);
  }
  function extendRoom(mins){
    if(!rm)return;
    var newExp=Math.max(Date.now(), rm.expiresAt||Date.now())+(mins*60*1000);
    fbUpdate('rooms/'+activeId+'/meta',{expiresAt:newExp});
  }
  function postQ(){
    if(!newQ.trim()||!rm)return;
    if(rm.expiresAt && Date.now()>rm.expiresAt){alert('This room is closed / 此問答室已結束');return}
    if(!rm.anonymous && !qAuthor.trim()){alert('Name required / 請填寫名字');return}
    var q={text:newQ.trim(),author:rm.anonymous?'Anon 匿名':qAuthor.trim(),likes:0,createdAt:ts()};
    fbPush('rooms/'+activeId+'/questions',q);
    setNewQ(''); setQAuthor('');
  }
  function likeQuestion(q){ fbIncLike('rooms/'+activeId+'/questions/'+q.id) }
  function deleteQuestion(qid){ fbRemove('rooms/'+activeId+'/questions/'+qid) }
  function likeAnswer(qid,aid){ fbIncLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid) }
  function addAnswer(qid,text,author){
    if(rm && rm.expiresAt && Date.now()>rm.expiresAt){alert('This room is closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function deleteAnswer(qid,aid){ fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid) }
  function likeReply(qid,aid,rid){ fbIncLike('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid) }
  function addReply(qid,aid,text,author){
    if(rm && rm.expiresAt && Date.now()>rm.expiresAt){alert('This room is closed / 此問答室已結束');return}
    fbPush('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies',{text:text,author:author,likes:0,createdAt:ts()});
  }
  function deleteReply(qid,aid,rid){ fbRemove('rooms/'+activeId+'/questions/'+qid+'/answers/'+aid+'/replies/'+rid) }

  var sorted = rm ? (rm.questions||[]).slice().sort(function(a,b){return (b.likes||0)-(a.likes||0)}) : [];

  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {confRoom && <Confirm msg={'Delete room "'+(rm?rm.name:activeId)+'"?\n刪除問答室「'+(rm?rm.name:activeId)+'」？'} onOk={function(){deleteRoom(activeId);setConfRoom(false)}} onCancel={function(){setConfRoom(false)}}/>}

    {sideOpen && <div className="sidebar-scrim" onClick={function(){setSideOpen(false)}}/>}

    <div className={'sidebar'+(sideOpen?'':' closed')}>
      <div style={{padding:'14px 10px 10px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:800,color:'var(--green)',fontSize:16,letterSpacing:.5}}>ClassQ&A</div>
        <button onClick={function(){setSideOpen(false)}} style={{background:'none',border:'none',color:'#6b7280',fontSize:18,cursor:'pointer',lineHeight:1,padding:'2px 4px'}} title="Close menu">&#10005;</button>
      </div>
      <div style={{padding:'8px 6px',flex:1,overflowY:'auto'}}>
        <div style={{fontSize:10,color:'#9ca3af',marginBottom:5,paddingLeft:4,letterSpacing:1,fontWeight:600}}>ROOMS</div>
        {Object.keys(roomList).length===0 && <div style={{fontSize:13,color:'#9ca3af',padding:'6px 4px'}}>No rooms yet</div>}
        {Object.values(roomList).map(function(r){
          return <div key={r.id} className={'rtab'+(activeId===r.id?' act':'')} onClick={function(){setActiveId(r.id);setSideOpen(false)}}>
            <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,opacity:.72,marginTop:2,display:'flex',alignItems:'center',gap:4}}>
              {hosts[r.id] && <span>Host</span>}
              <span>{r.anonymous?'Anon':'Named'}</span>
              {r.expiresAt && <IconClock/>}
            </div>
          </div>;
        })}
      </div>
      <div className="sfooter">
        Architect: <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer">Prof. Shihmin Lo</a>
      </div>
    </div>

    <div className="main-col">
      <div className="topbar">
        <button onClick={function(){setSideOpen(!sideOpen)}} style={{background:'none',border:'none',color:'#fff',fontSize:19,cursor:'pointer',padding:'0 3px',flexShrink:0,lineHeight:1}} title="Menu 目錄">&#9776;</button>
        <span style={{fontWeight:700,fontSize:15,flexShrink:0,maxWidth:'28%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {rm ? rm.name : 'ClassQ&A'}
        </span>
        {rm && <div style={{display:'flex',alignItems:'center',gap:5,flex:1,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {rm.expiresAt && <Timer expiresAt={rm.expiresAt} onExpire={function(){setShowExtend(true)}}/>}
          <CodePill code={activeId} onZoom={function(){setModal('code')}}/>
          {isHost && <ManageMenu onCSV={function(){exportCSV(rm)}} onDelete={function(){setConfRoom(true)}}/>}
          {!isHost && rm.allowExport && <button className="ic" onClick={function(){exportCSV(rm)}} title="Export CSV 匯出">CSV</button>}
        </div>}
      </div>

      <div className="actionsbar">
        <button className="btn btn-p" onClick={function(){setModal('create')}} style={{fontSize:12}}>+ Create 建立</button>
        <button className="btn btn-g" onClick={function(){setModal('join')}} style={{fontSize:12}}>Join/Switch 加入或切換</button>
        {rm && <span style={{fontSize:11,color:'#9ca3af',marginLeft:'auto'}}>Current 目前：{rm.name}</span>}
      </div>


      <div className="content-area">
        {!activeId ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:12,textAlign:'center',padding:20}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--green)',letterSpacing:.5}}>ClassQ&A</div>
          <div style={{fontSize:14,color:'#6b7280',maxWidth:300,lineHeight:1.6}}>
            Create or join a room to start.<br/>建立或加入問答室開始提問。
          </div>
        </div> : (loading || rm===null) ? <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#9ca3af',fontSize:14}}>
          Loading… 連線中…
        </div> : rm===undefined ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,textAlign:'center',padding:20}}>
          <div style={{fontSize:15,color:'#b91c1c',fontWeight:600}}>Room not found 找不到此問答室</div>
        </div> : <div className="content-inner">
          {isClosed ? <div className="card" style={{textAlign:'center',color:'#b91c1c',fontWeight:600,fontSize:15}}>
            Session closed 問答已結束
            {isHost && <div style={{marginTop:10}}><button className="btn btn-p" onClick={function(){setShowExtend(true)}}>Extend 延長</button></div>}
          </div> : <div className="card" style={{borderLeft:'4px solid var(--green)'}}>
            <div style={{fontWeight:700,color:'var(--green)',marginBottom:9,fontSize:13,letterSpacing:.3}}>Ask a Question 提問</div>
            {!rm.anonymous && <div style={{marginBottom:8}}>
              <input type="text" value={qAuthor} onChange={function(e){setQAuthor(e.target.value)}}
                placeholder="Your name 你的名字 *" style={{borderColor:qAuthor.trim()?'#d1d5db':'#f87171'}}/>
              {!qAuthor.trim() && <div className="err">Required 必填</div>}
            </div>}
            <VoiceTxt value={newQ} onChange={setNewQ} placeholder="Type or speak your question… / 輸入或語音提問…" rows={3}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'#9ca3af'}}>{rm.anonymous?'Anon 匿名':'Named 具名'}</span>
              <button className="btn btn-p" onClick={postQ}>Submit 送出</button>
            </div>
          </div>}
          {sorted.length===0 ? <div style={{textAlign:'center',color:'#9ca3af',padding:'34px 0',fontSize:14,lineHeight:1.7}}>
            No questions yet. Be the first!<br/>尚無提問，歡迎第一個提問！
          </div> : <div>
            <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>
              {sorted.length} question{sorted.length>1?'s':''} · sorted by likes 依讚數排序
            </div>
            {sorted.map(function(q){return <QCard key={q.id} q={q} isHost={isHost} anon={rm.anonymous}
              onLikeQ={likeQuestion} onDeleteQ={deleteQuestion}
              onLikeAnswer={likeAnswer} onAddAnswer={addAnswer} onDeleteAnswer={deleteAnswer}
              onLikeReply={likeReply} onAddReply={addReply} onDeleteReply={deleteReply}/>})}
          </div>}
        </div>}
      </div>
    </div>

    {modal==='create' && <CreateModal onClose={function(){setModal(null)}} onCreate={createRoom}/>}
    {modal==='join' && <JoinModal onClose={function(){setModal(null)}} onJoin={joinRoom} joinedRooms={Object.values(roomList).filter(function(r){return joined[r.id] && r.id!==activeId})}/>}
    {modal==='code' && <CodeModal code={activeId||''} onClose={function(){setModal(null)}}/>}
    {showExtend && <ExtendModal onExtend={extendRoom} onClose={function(){setShowExtend(false)}}/>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
